<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cobranzas · Fullminet</title>
<style>
  :root{
    --bg:#fff; --bg2:#f5f5f7; --bg3:#e8e8ed;
    --text:#1d1d1f; --text2:#6e6e73; --text3:#aeaeb2;
    --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
    --labs:#0071e3; --nutri:#34c759; --candle:#ff9f0a;
    --cobrar:#ff9500; --cobrado:#34c759; --pend:#8e8e93; --danger:#ff3b30;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{font-family:-apple-system,'SF Pro Text','Inter',system-ui,sans-serif; background:var(--bg2); color:var(--text); font-size:17px; line-height:1.5; padding-bottom:60px;}
  header{position:sticky; top:0; z-index:50; background:rgba(255,255,255,0.82); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%); border-bottom:0.5px solid var(--border); padding:12px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px;}
  header .ttl{font-size:20px; font-weight:700; letter-spacing:-0.02em;}
  header .sub{font-size:12px; color:var(--text2);}
  .btn-cerrar{background:var(--text); color:#fff; border:none; border-radius:980px; padding:9px 16px; font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap;}
  .btn-cerrar:active{transform:scale(0.96);}
  main{max-width:720px; margin:0 auto; padding:16px 14px;}
  .card{background:var(--bg); border-radius:18px; border:0.5px solid var(--border); padding:18px; margin-bottom:16px;}
  .label{font-size:11px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text2); margin:0 0 12px;}

  /* HERO PARA COBRAR */
  .hero{background:linear-gradient(135deg,#fff 0%,#fffaf2 100%); border:0.5px solid var(--border);}
  .hero .total{font-size:40px; font-weight:800; letter-spacing:-0.03em; color:var(--cobrar); line-height:1;}
  .hero .totlbl{font-size:12px; color:var(--text2); text-transform:uppercase; letter-spacing:0.05em; margin-top:4px; font-weight:600;}
  .poremp{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:16px;}
  .pe{background:var(--bg2); border-radius:14px; padding:12px 10px; text-align:center;}
  .pe .m{font-size:17px; font-weight:700; letter-spacing:-0.02em;}
  .pe .n{font-size:11px; font-weight:700; margin-top:3px;}
  .pe[data-e="Labs"] .n{color:var(--labs);} .pe[data-e="Nutrivibe"] .n{color:#1a8a3c;} .pe[data-e="SC.CANDLE"] .n{color:#c25e00;}
  .pe .c{font-size:10px; color:var(--text3); margin-top:1px;}

  /* NUEVO PEDIDO */
  .inp{width:100%; background:var(--bg2); border:0.5px solid var(--border); border-radius:11px; padding:13px 14px; font-size:17px; color:var(--text); outline:none; transition:border-color .2s; margin-bottom:10px;}
  .inp:focus{border-color:var(--labs);}
  .row2{display:flex; gap:10px;}
  .row2 .inp{flex:1;}
  .empresas{display:flex; gap:8px; margin-bottom:10px;}
  .empresas button{flex:1; border:1.5px solid var(--border); background:#fff; border-radius:12px; padding:10px 4px; font-size:14px; font-weight:700; cursor:pointer; color:var(--text2); transition:.15s;}
  .empresas button.on[data-e="Labs"]{border-color:var(--labs); color:var(--labs); background:#eaf4fe;}
  .empresas button.on[data-e="Nutrivibe"]{border-color:var(--nutri); color:#1a8a3c; background:#e9f9ee;}
  .empresas button.on[data-e="SC.CANDLE"]{border-color:var(--candle); color:#c25e00; background:#fff4e5;}
  .btn-add{width:100%; border:none; border-radius:980px; padding:15px; font-size:17px; font-weight:600; color:#fff; cursor:pointer; background:var(--text); transition:transform .1s;}
  .btn-add:active{transform:scale(0.985);}

  /* FILTROS */
  .filtros{display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap;}
  .filtros button{border:0.5px solid var(--border); background:#fff; border-radius:980px; padding:7px 14px; font-size:13px; font-weight:600; color:var(--text2); cursor:pointer;}
  .filtros button.on{background:var(--text); color:#fff; border-color:var(--text);}
  .filtros button .badge{font-size:11px; opacity:.7; margin-left:4px;}

  /* PEDIDO CARD */
  .pedido{border:0.5px solid var(--border); border-radius:16px; padding:14px; margin-bottom:12px; background:#fff;}
  .pedido.cobrado{opacity:.62;}
  .ptop{display:flex; align-items:center; gap:8px; margin-bottom:6px;}
  .pnum{font-size:17px; font-weight:700;}
  .echip{font-size:11px; font-weight:700; padding:2px 9px; border-radius:980px; cursor:pointer; user-select:none;}
  .echip.Labs{background:#eaf4fe; color:var(--labs);} .echip.Nutrivibe{background:#e9f9ee; color:#1a8a3c;} .echip.SC\.CANDLE{background:#fff4e5; color:#c25e00;}
  .estado{font-size:11px; font-weight:700; padding:3px 10px; border-radius:980px; margin-left:auto;}
  .estado.pendiente{background:#eee; color:var(--pend);}
  .estado.cobrar{background:#fff0d6; color:#b06e00;}
  .estado.cobrado{background:#e6f7ec; color:#1a8a3c;}
  .pcli{font-size:15px; color:var(--text);}
  .ploc{font-size:13px; color:var(--text2);}
  .pmonto{font-size:22px; font-weight:800; letter-spacing:-0.02em; margin-top:4px;}
  .pacts{display:flex; gap:8px; margin-top:12px; align-items:center;}
  .badv{flex:1; border:none; border-radius:980px; padding:11px; font-size:14px; font-weight:700; cursor:pointer; color:#fff;}
  .badv.aentregar{background:var(--cobrar);}
  .badv.acobrar{background:var(--cobrado);}
  .bmini{border:0.5px solid var(--border2); background:#fff; border-radius:980px; padding:9px 14px; font-size:13px; font-weight:600; color:var(--text2); cursor:pointer;}
  .del{border:none; background:transparent; color:var(--text3); font-size:20px; cursor:pointer; padding:4px 6px; line-height:1;}
  .del:active{color:var(--danger);}
  .empty{text-align:center; color:var(--text3); font-size:14px; padding:26px 0;}
  .tools{display:flex; gap:8px; margin-top:8px;}
  .tools button{flex:1; border:0.5px solid var(--border2); background:#fff; border-radius:980px; padding:10px; font-size:13px; font-weight:600; color:var(--text); cursor:pointer;}
  .hint{font-size:12px; color:var(--text3); margin-top:8px; text-align:center;}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(120px); background:var(--text); color:#fff; padding:12px 20px; border-radius:980px; font-size:14px; font-weight:600; z-index:100; transition:transform .3s; box-shadow:0 8px 24px rgba(0,0,0,0.2);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  @media(max-width:400px){ .hero .total{font-size:32px;} .pe .m{font-size:15px;} }
</style>
</head>
<body>
<header>
  <div>
    <div class="ttl">Cobranzas · Fullminet</div>
    <div class="sub" id="hoy"></div>
  </div>
  <button class="btn-cerrar" onclick="cerrarSemana()">Cerrar semana</button>
</header>

<main>
  <!-- HERO: PARA COBRAR -->
  <div class="card hero">
    <div class="total" id="totalCobrar">$0</div>
    <div class="totlbl">Para cobrar esta semana</div>
    <div class="poremp" id="porEmpresa"></div>
  </div>

  <!-- NUEVO PEDIDO -->
  <div class="card">
    <p class="label">Cargar pedido</p>
    <div class="empresas" id="empresas">
      <button data-e="Labs" onclick="setEmpresa('Labs')">Labs</button>
      <button data-e="Nutrivibe" onclick="setEmpresa('Nutrivibe')">Nutrivibe</button>
      <button data-e="SC.CANDLE" onclick="setEmpresa('SC.CANDLE')">SC.CANDLE</button>
    </div>
    <div class="row2">
      <input class="inp" id="f-num" placeholder="Orden # (ej: 4596)" style="flex:0 0 42%;" inputmode="text">
      <input class="inp" id="f-monto" placeholder="Monto $" inputmode="numeric">
    </div>
    <input class="inp" id="f-cli" placeholder="Cliente (opcional)">
    <input class="inp" id="f-loc" placeholder="Localidad (opcional)">
    <button class="btn-add" onclick="agregar()">Agregar pedido</button>
  </div>

  <!-- LISTA -->
  <div class="card">
    <div class="filtros" id="filtros">
      <button data-f="pendiente" onclick="setFiltro('pendiente')">Pendientes <span class="badge" id="b-pendiente"></span></button>
      <button class="on" data-f="cobrar" onclick="setFiltro('cobrar')">Para cobrar <span class="badge" id="b-cobrar"></span></button>
      <button data-f="cobrado" onclick="setFiltro('cobrado')">Cobrados <span class="badge" id="b-cobrado"></span></button>
      <button data-f="todos" onclick="setFiltro('todos')">Todos</button>
    </div>
    <div id="lista"></div>
    <div class="tools">
      <button onclick="copiarResumen()">Copiar cobranzas</button>
      <button onclick="verHistorico()">Ver histórico</button>
    </div>
  </div>

  <p class="hint" id="pie"></p>
</main>
<div class="toast" id="toast"></div>

<script>
/* ===== almacenamiento con respaldo ===== */
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return (window.__m&&window.__m[k])??d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){window.__m=window.__m||{};window.__m[k]=v;}}

/* ===== pedidos reales precargados (de tus PDFs) ===== */
const PRE = [
 {num:'#4593', empresa:'Labs', cliente:'Maria Cristina Dorronzoro', monto:70250,  loc:'Lincoln, BA', fecha:'15/07/2026'},
 {num:'#4587', empresa:'Labs', cliente:'Maria Jose Bejar',          monto:37470,  loc:'S.M. de Tucumán', fecha:'14/07/2026'},
 {num:'#4589', empresa:'Labs', cliente:'Lelia Viviana Fabian',      monto:103540, loc:'Gran Buenos Aires', fecha:'15/07/2026'},
 {num:'#4590', empresa:'Labs', cliente:'Marcela Cecilia Arevalo',   monto:166408, loc:'Formosa (sucursal)', fecha:'15/07/2026'},
 {num:'#4591', empresa:'Labs', cliente:'Gaston Perez',              monto:22640,  loc:'Resistencia, Chaco (suc.)', fecha:'15/07/2026'},
 {num:'#4595', empresa:'Labs', cliente:'Agustin Plata',             monto:91098,  loc:'Ushuaia, T. del Fuego', fecha:'15/07/2026'},
];

/* ===== estado ===== */
let pedidos = load('fn_pedidos', null);
if(pedidos===null){
  pedidos = PRE.map((p,i)=>({id:'p'+i, ...p, estado:'pendiente', fEntrega:'', fCobro:''}));
  save('fn_pedidos', pedidos);
}
let histo = load('fn_histo', []);
let empresa = load('fn_ultEmp','Labs');
let filtro = 'cobrar';

const $=id=>document.getElementById(id);
const fmt = n => '$'+(Math.round(n||0)).toLocaleString('es-AR');
function fechaHoy(){return new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}

$('hoy').textContent = 'Pedidos y cobranzas · '+fechaHoy();

/* ===== empresa selector ===== */
function setEmpresa(e){empresa=e;save('fn_ultEmp',e);document.querySelectorAll('#empresas button').forEach(b=>b.classList.toggle('on',b.dataset.e===e));}

/* ===== agregar pedido ===== */
function agregar(){
  let num=$('f-num').value.trim();
  if(!num){toast('Poné el número de orden');return;}
  if(/^\d+$/.test(num)) num='#'+num;
  const monto=parseInt(($('f-monto').value||'').replace(/\D/g,''))||0;
  const cliente=$('f-cli').value.trim();
  const loc=$('f-loc').value.trim();
  pedidos.unshift({id:Date.now()+''+Math.floor(Math.random()*99),num,empresa,cliente,loc,monto,estado:'pendiente',fecha:fechaHoy(),fEntrega:'',fCobro:''});
  save('fn_pedidos',pedidos);
  $('f-num').value='';$('f-monto').value='';$('f-cli').value='';$('f-loc').value='';
  toast('Pedido '+num+' cargado');
  render();
}

/* ===== avanzar / retroceder estado ===== */
function avanzar(id){
  const p=pedidos.find(x=>x.id===id);if(!p)return;
  if(p.estado==='pendiente'){p.estado='cobrar';p.fEntrega=fechaHoy();toast(p.num+' → Para cobrar');}
  else if(p.estado==='cobrar'){p.estado='cobrado';p.fCobro=fechaHoy();toast(p.num+' cobrado ✓');}
  save('fn_pedidos',pedidos);render();
}
function retroceder(id){
  const p=pedidos.find(x=>x.id===id);if(!p)return;
  if(p.estado==='cobrado'){p.estado='cobrar';p.fCobro='';}
  else if(p.estado==='cobrar'){p.estado='pendiente';p.fEntrega='';}
  save('fn_pedidos',pedidos);render();
}
function cambiarEmpresa(id,ev){ev.stopPropagation();const p=pedidos.find(x=>x.id===id);if(!p)return;const o=['Labs','Nutrivibe','SC.CANDLE'];p.empresa=o[(o.indexOf(p.empresa)+1)%3];save('fn_pedidos',pedidos);render();}
function borrar(id){const p=pedidos.find(x=>x.id===id);if(!p)return;if(!confirm(`¿Borrar el pedido ${p.num}?`))return;pedidos=pedidos.filter(x=>x.id!==id);save('fn_pedidos',pedidos);render();}

/* ===== filtros ===== */
function setFiltro(f){filtro=f;document.querySelectorAll('#filtros button').forEach(b=>b.classList.toggle('on',b.dataset.f===f));renderLista();}

/* ===== render ===== */
function renderHero(){
  const porCobrar=pedidos.filter(p=>p.estado==='cobrar');
  const total=porCobrar.reduce((a,p)=>a+p.monto,0);
  $('totalCobrar').textContent=fmt(total);
  const t={Labs:0,Nutrivibe:0,'SC.CANDLE':0},c={Labs:0,Nutrivibe:0,'SC.CANDLE':0};
  porCobrar.forEach(p=>{t[p.empresa]+=p.monto;c[p.empresa]++;});
  $('porEmpresa').innerHTML=['Labs','Nutrivibe','SC.CANDLE'].map(e=>`
    <div class="pe" data-e="${e}">
      <div class="m">${fmt(t[e])}</div>
      <div class="n">${e}</div>
      <div class="c">${c[e]} pedido${c[e]===1?'':'s'}</div>
    </div>`).join('');
}
function badge(estado){return pedidos.filter(p=>p.estado===estado).length||'';}
function renderLista(){
  ['pendiente','cobrar','cobrado'].forEach(s=>$('b-'+s).textContent=badge(s));
  const lista = filtro==='todos'? pedidos : pedidos.filter(p=>p.estado===filtro);
  const cont=$('lista');
  if(!lista.length){cont.innerHTML='<div class="empty">No hay pedidos acá 🙌</div>';return;}
  const nombreEstado={pendiente:'Pendiente',cobrar:'Para cobrar',cobrado:'Cobrado'};
  cont.innerHTML=lista.map(p=>{
    let accion='';
    if(p.estado==='pendiente') accion=`<button class="badv aentregar" onclick="avanzar('${p.id}')">Marcar entregado</button>`;
    else if(p.estado==='cobrar') accion=`<button class="badv acobrar" onclick="avanzar('${p.id}')">Marcar cobrado</button>`;
    else accion=`<button class="bmini" onclick="retroceder('${p.id}')">Deshacer cobro</button>`;
    const back = p.estado==='cobrar'?`<button class="bmini" onclick="retroceder('${p.id}')">↩</button>`:'';
    return `<div class="pedido ${p.estado==='cobrado'?'cobrado':''}">
      <div class="ptop">
        <span class="pnum">${p.num}</span>
        <span class="echip ${p.empresa}" onclick="cambiarEmpresa('${p.id}',event)">${p.empresa}</span>
        <span class="estado ${p.estado}">${nombreEstado[p.estado]}</span>
      </div>
      ${p.cliente?`<div class="pcli">${p.cliente}</div>`:''}
      ${p.loc?`<div class="ploc">${p.loc}</div>`:''}
      <div class="pmonto">${fmt(p.monto)}</div>
      <div class="pacts">${accion}${back}<button class="del" onclick="borrar('${p.id}')">×</button></div>
    </div>`;
  }).join('');
}
function renderPie(){
  const n=e=>pedidos.filter(p=>p.estado===e).length;
  $('pie').textContent=`${n('pendiente')} pendientes · ${n('cobrar')} para cobrar · ${n('cobrado')} cobrados · ${histo.length} archivados`;
}
function render(){renderHero();renderLista();renderPie();}

/* ===== cerrar semana: archiva cobrados ===== */
function cerrarSemana(){
  const cob=pedidos.filter(p=>p.estado==='cobrado');
  if(!cob.length){toast('No hay pedidos cobrados para cerrar');return;}
  const tot=cob.reduce((a,p)=>a+p.monto,0);
  if(!confirm(`Cerrar semana: se archivan ${cob.length} pedidos cobrados (${fmt(tot)}). ¿Seguimos?`))return;
  const stamp=fechaHoy();
  histo=histo.concat(cob.map(p=>({...p,cerrado:stamp})));
  pedidos=pedidos.filter(p=>p.estado!=='cobrado');
  save('fn_histo',histo);save('fn_pedidos',pedidos);
  toast('Semana cerrada ✓');render();
}

/* ===== copiar / histórico ===== */
function copiarResumen(){
  const pc=pedidos.filter(p=>p.estado==='cobrar');
  let txt=`COBRANZAS FULLMINET · ${fechaHoy()}\nPARA COBRAR: ${fmt(pc.reduce((a,p)=>a+p.monto,0))}\n`;
  ['Labs','Nutrivibe','SC.CANDLE'].forEach(e=>{
    const l=pc.filter(p=>p.empresa===e); if(!l.length)return;
    txt+=`\n— ${e}: ${fmt(l.reduce((a,p)=>a+p.monto,0))} —\n`;
    l.forEach(p=>txt+=`${p.num}  ${p.cliente||''}  ${fmt(p.monto)}\n`);
  });
  try{navigator.clipboard.writeText(txt);toast('Cobranzas copiadas 📋');}catch(e){prompt('Copiá:',txt);}
}
function verHistorico(){
  if(!histo.length){toast('Todavía no archivaste nada');return;}
  const g={};histo.forEach(p=>{(g[p.cerrado]=g[p.cerrado]||[]).push(p);});
  let txt='HISTÓRICO COBRADO\n';
  Object.keys(g).forEach(f=>{const t=g[f].reduce((a,p)=>a+p.monto,0);txt+=`\nCerrado ${f} · ${g[f].length} pedidos · ${fmt(t)}\n`;});
  alert(txt);
}

/* ===== init ===== */
setEmpresa(empresa); setFiltro('cobrar'); render();
</script>
</body>
</html>
