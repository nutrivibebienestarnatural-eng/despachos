<style>
/* =========================================================================
   TOKENS — estilo Apple. Una sola fuente de verdad para color, tipo y medida.
   ========================================================================= */
:root{
  --bg:#fff;--bg-2:#f5f5f7;--bg-3:#ececf1;
  --text:#1d1d1f;--text-2:#6e6e73;--text-3:#a1a1a8;
  --border:rgba(0,0,0,.07);--border-2:rgba(0,0,0,.14);
  --accent:#0071e3;--accent-weak:rgba(0,113,227,.12);
  --green:#2fb350;--green-weak:rgba(47,179,80,.14);
  --amber:#f59300;--amber-weak:rgba(245,147,0,.15);
  --violet:#a855f7;--violet-weak:rgba(168,85,247,.14);
  --red:#ff3b30;
  --r-card:20px;--r-inp:12px;--r-pill:980px;--r-chip:8px;
  --sh-sm:0 1px 2px rgba(0,0,0,.05),0 0 0 .5px rgba(0,0,0,.04);
  --sh-md:0 6px 22px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.06);
  --fs:-apple-system,"SF Pro Display","SF Pro Text","Inter",system-ui,sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#000;--bg-2:#161618;--bg-3:#242427;
  --text:#f5f5f7;--text-2:#a1a1a8;--text-3:#6e6e73;
  --border:rgba(255,255,255,.10);--border-2:rgba(255,255,255,.20);
  --accent:#2997ff;--accent-weak:rgba(41,151,255,.18);
  --sh-sm:0 0 0 .5px rgba(255,255,255,.06);
  --sh-md:0 10px 30px rgba(0,0,0,.5);
}}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--fs);font-size:17px;line-height:1.5;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh}
button,input,select,textarea{font-family:inherit;font-size:17px;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:var(--accent);text-decoration:none}
.ico{width:18px;height:18px;flex:none;vertical-align:-3px}

/* ---- Navbar con logo ---- */
.nav{position:sticky;top:0;z-index:50;height:56px;display:flex;align-items:center;gap:12px;
  padding:0 20px;background:color-mix(in srgb,var(--bg) 72%,transparent);
  backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);
  border-bottom:.5px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(145deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#000));
  display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--sh-sm)}
.logo .mark .ico{width:18px;height:18px}
.logo .txt{font-weight:680;letter-spacing:-.02em;font-size:17px;line-height:1}
.logo .txt small{display:block;font-size:10.5px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;color:var(--text-2);margin-top:2px}
.nav .sp{flex:1}
.nav .role-pill{font-size:13px;font-weight:500;color:var(--text-2);background:var(--bg-2);
  padding:7px 14px;border-radius:var(--r-pill);border:.5px solid var(--border);transition:.2s}
.nav .role-pill:hover{color:var(--text);border-color:var(--border-2)}

.wrap{max-width:960px;margin:0 auto;padding:28px 20px 100px}
.title{font-size:34px;font-weight:700;letter-spacing:-.025em;line-height:1.05;margin-bottom:6px}
.subtitle{color:var(--text-2);font-size:17px;margin-bottom:26px}
.label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text-2);margin-bottom:9px;display:block}

/* ---- Cards ---- */
.card{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:22px;box-shadow:var(--sh-sm)}
.grid{display:grid;gap:12px}

/* ---- KPIs ---- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
.kpi{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:18px;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.kpi .ico{position:absolute;top:16px;right:16px;color:var(--text-3);width:19px;height:19px}
.kpi .n{font-size:38px;font-weight:700;letter-spacing:-.03em;line-height:1;
  font-variant-numeric:tabular-nums}
.kpi .l{font-size:12.5px;color:var(--text-2);margin-top:8px;font-weight:450}
.kpi.accent .n{color:var(--accent)}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}.kpi .n{font-size:32px}}

/* ---- Panel (dashboard) ---- */
.hero{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:30px 26px;box-shadow:var(--sh-sm);margin-bottom:12px}
.hero .n{font-size:52px;font-weight:700;letter-spacing:-.035em;line-height:1;font-variant-numeric:tabular-nums}
.hero .c{color:var(--text-2);font-size:15px;margin-top:10px}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
@media(max-width:640px){.tiles{grid-template-columns:repeat(2,1fr)}}
.tile{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:18px;box-shadow:var(--sh-sm);cursor:pointer;text-align:left;
  transition:transform .12s ease,border-color .2s,box-shadow .2s;display:flex;flex-direction:column;gap:10px;min-height:108px}
.tile:hover{border-color:var(--border-2);box-shadow:var(--sh-md);transform:translateY(-2px)}
.tile:active{transform:scale(.98)}
.tile .ico{width:22px;height:22px;color:var(--accent)}
.tile .tn{font-size:17px;font-weight:600;letter-spacing:-.01em}
.tile .ts{font-size:13px;color:var(--text-2);margin-top:auto}
.tile .badge-n{font-size:13px;font-weight:700;color:var(--accent)}

/* ---- Importar: zona de carga ---- */
.dropzone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;
  border:1.5px dashed var(--border-2);border-radius:var(--r-card);padding:36px 20px;cursor:pointer;
  background:var(--bg-2);transition:border-color .2s,background .2s,transform .12s;color:var(--text-2)}
.dropzone:hover{border-color:var(--accent)}
.dropzone:active{transform:scale(.99)}
.dropzone.over{border-color:var(--accent);background:var(--accent-weak)}
.dropzone svg{width:28px;height:28px;color:var(--accent)}
.dropzone .dz-t{font-size:16px;font-weight:600;color:var(--text)}
.dropzone .dz-s{font-size:13px}

/* ---- Escáner de entrega (cadete) ---- */
.scan-ov{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center}
.scan-vid{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.scan-frame{position:relative;width:78%;max-width:320px;height:150px;border:3px solid #fff;border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.45)}
.scan-hint{position:absolute;left:0;right:0;bottom:118px;color:#fff;font-size:16px;font-weight:600;text-align:center;padding:0 24px}
.scan-x{position:absolute;bottom:40px;left:50%;transform:translateX(-50%)}

/* ---- Inputs ---- */
.field{margin-bottom:16px}
input,select,textarea{width:100%;background:var(--bg);border:.5px solid var(--border-2);
  border-radius:var(--r-inp);padding:12px 14px;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-weak)}
textarea{resize:vertical;min-height:66px;font-size:15px;line-height:1.5}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.two{grid-template-columns:1fr}}

/* ---- Botones ---- */
.btn{background:var(--accent);color:#fff;border-radius:var(--r-pill);padding:12px 20px;
  font-weight:590;letter-spacing:-.01em;transition:opacity .2s,transform .08s,box-shadow .2s;
  display:inline-flex;align-items:center;gap:8px;justify-content:center;box-shadow:var(--sh-sm)}
.btn:hover{opacity:.88}.btn:active{transform:scale(.97)}
.btn .ico{width:17px;height:17px}
.btn.block{width:100%}
.btn.ghost{background:var(--bg-3);color:var(--text);box-shadow:none}
.btn.ghost:hover{background:var(--border-2);opacity:1}
.btn.green{background:var(--green)}.btn.amber{background:var(--amber);color:#1d1d1f}.btn.red{background:var(--red)}
.btn.sm{padding:9px 15px;font-size:14px}
.btn.sm .ico{width:15px;height:15px}

/* ---- Segmented control ---- */
.seg{display:inline-flex;background:var(--bg-3);border-radius:var(--r-pill);padding:3px;gap:2px}
.seg button{padding:8px 18px;border-radius:var(--r-pill);font-size:14px;font-weight:540;
  color:var(--text-2);transition:.18s;display:inline-flex;align-items:center;gap:6px}
.seg button.on{background:var(--bg);color:var(--text);box-shadow:var(--sh-sm)}
@media(prefers-color-scheme:dark){.seg button.on{background:var(--bg-3)}}

/* ---- Lista de pedidos ---- */
.order{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:18px;margin-bottom:12px;box-shadow:var(--sh-sm);
  transition:border-color .2s,transform .15s,box-shadow .2s}
.order:hover{border-color:var(--border-2);transform:translateY(-1px);box-shadow:var(--sh-md)}
.order .top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.order .code{font-weight:700;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.order .who{color:var(--text-2);font-size:15px}
.order .addr{color:var(--text-2);font-size:14px;margin:5px 0 12px;line-height:1.45}
.order .acts{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}

/* ---- Badges / chips ---- */
.badge{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:540;
  background:var(--bg);border:.5px solid var(--border);padding:5px 12px;border-radius:var(--r-pill)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text-3);flex:none}
.chip{font-size:10.5px;font-weight:680;letter-spacing:.04em;padding:4px 9px;border-radius:var(--r-chip);
  background:var(--bg-3);color:var(--text-2);text-transform:uppercase;display:inline-flex;align-items:center;gap:5px}
.chip .ico{width:12px;height:12px}
.chip.flex{background:var(--amber-weak);color:var(--amber)}
.chip.tn{background:var(--accent-weak);color:var(--accent)}
.chip.correo{background:var(--violet-weak);color:var(--violet)}
.chip.cadete{background:var(--green-weak);color:var(--green)}
.tag{font-size:10.5px;font-weight:680;letter-spacing:.05em;text-transform:uppercase;
  color:var(--text-2);background:var(--bg-3);padding:3px 8px;border-radius:6px}

/* ---- Timeline ---- */
.tl{position:relative;margin:22px 0 4px;padding-left:32px}
.tl::before{content:"";position:absolute;left:9px;top:8px;bottom:8px;width:2px;background:var(--bg-3)}
.tl .step{position:relative;padding:0 0 24px}
.tl .step:last-child{padding-bottom:0}
.tl .step .pt{position:absolute;left:-32px;top:0;width:20px;height:20px;border-radius:50%;
  background:var(--bg);border:2px solid var(--bg-3);transition:.25s}
.tl .step.done .pt{background:var(--green);border-color:var(--green)}
.tl .step.current .pt{background:var(--accent);border-color:var(--accent);
  box-shadow:0 0 0 5px var(--accent-weak)}
.tl .step .s-t{font-weight:590;letter-spacing:-.01em}
.tl .step.pending .s-t{color:var(--text-3);font-weight:500}
.tl .step .s-d{font-size:14px;color:var(--text-2);margin-top:2px}
.tl .step .s-ts{font-size:12px;color:var(--text-3);margin-top:4px;font-variant-numeric:tabular-nums}

/* ---- Pantalla inicial ---- */
.roles{display:grid;gap:14px;max-width:440px;margin:36px auto 0}
.role-card{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:20px;text-align:left;display:flex;align-items:center;gap:16px;box-shadow:var(--sh-sm);
  transition:border-color .2s,transform .15s,box-shadow .2s}
.role-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--sh-md)}
.role-card:active{transform:scale(.99)}
.role-card .rc-ico{width:48px;height:48px;border-radius:13px;background:var(--accent-weak);color:var(--accent);
  display:flex;align-items:center;justify-content:center;flex:none}
.role-card .rc-ico .ico{width:24px;height:24px}
.role-card h3{font-size:19px;letter-spacing:-.01em}
.role-card p{color:var(--text-2);font-size:14px;margin-top:3px;line-height:1.4}
.role-card .rc-go{margin-left:auto;color:var(--text-3)}

/* ---- Estado vacío ---- */
.empty{text-align:center;padding:48px 20px;color:var(--text-2)}
.empty .e-ico{width:56px;height:56px;border-radius:16px;background:var(--bg-2);border:.5px solid var(--border);
  color:var(--text-3);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.empty .e-ico .ico{width:26px;height:26px}
.empty p{font-size:15px}

.muted{color:var(--text-2)}.center{text-align:center}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.hide{display:none!important}
hr{border:none;border-top:.5px solid var(--border);margin:20px 0}
.proof img{max-width:100%;border-radius:14px;margin-top:10px;border:.5px solid var(--border)}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filters button{white-space:nowrap;font-size:14px;font-weight:500;padding:8px 15px;border-radius:var(--r-pill);
  background:var(--bg-2);border:.5px solid var(--border);color:var(--text-2);transition:.18s}
.filters button:hover{border-color:var(--border-2)}
.filters button.on{background:var(--text);color:var(--bg);border-color:transparent}
.hint{font-size:13.5px;color:var(--text-2);background:var(--bg);border:.5px solid var(--border);
  border-radius:14px;padding:12px 14px;margin-top:8px;line-height:1.5}

#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:var(--bg);padding:13px 22px;border-radius:var(--r-pill);font-size:15px;
  font-weight:540;opacity:0;transition:.3s cubic-bezier(.2,.8,.2,1);z-index:200;pointer-events:none;
  max-width:90vw;text-align:center;box-shadow:var(--sh-md)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<script>
/* =========================================================================

   Pegá tu config de Firebase para sincronizar entre dispositivos en vivo.
   Vacío = MODO DEMO (guarda en este navegador). Instrucciones al final.
   ========================================================================= */
const FIREBASE_CONFIG = {

  authDomain: "fullminenet.firebaseapp.com",

const CADETES = ["Cadete CABA 1","Cadete CABA 2","Cadete CABA 3"]; // editá con nombres reales
const CORREOS = ["Andreani","OCA","Correo Argentino","Vía Cargo","Cruz del Sur"];
/* Catálogo de productos. El campo `barcode` es lo que lee el lector:
   poné el código de barras real (EAN) impreso en cada paquete. Acá uso el SKU como referencia.
   Completá con tu catálogo completo de Labs Nutrition. */
const PRODUCTOS = [
  {barcode:"PLN1052",nombre:"Hipo T - Tiroides Saludables (60 Caps)"},
  {barcode:"PLN1086",nombre:"Omega 3 (60 capsulas)"},
  {barcode:"",       nombre:"Cafeína + Guaraná - Concentración, Energía (60 Capsulas)"},

  {barcode:"PLN1061",nombre:"Kit Hongo Candida (180 capsulas)"}
];
/* Impresora de etiquetas: ajustá al tamaño del rollo (en mm) que uses */
const LABEL_MM = { w:100, h:150 };  // 10x15 cm (estándar e-commerce). Ej. más chico: {w:100,h:100}
const LOGISTICA = "Fullminet";      // Tu empresa de logística (va como marca de la etiqueta)
const LABEL_QR = true;              // QR de seguimiento (necesita internet al imprimir; el código de barras NO)
/* El link de reseñas de Google ahora se configura por empresa (ver EMPRESAS más abajo).
   Solo se le pide reseña al cliente si la empresa de ese pedido tiene 'review' cargado. */
/* Costo fijo de envío por canal (editá estos valores cuando cambien) */
/* EMPRESAS que despachás (editá nombres y tarifas). canal: 'ml_flex' o 'tiendanube' */
/* EMPRESAS dueñas de los pedidos (cada una puede vender por cualquier canal) */
const EMPRESAS = [

  { id:"labs",      nombre:"Labs Nutrition", canalDefault:"tiendanube",

  { id:"nutrivibe", nombre:"Nutrivibe",      canalDefault:"ml_flex", review:"" },

/* CANALES de venta (independientes de la empresa). costo = tarifa fija de envío */
const CANALES = [
  { id:"tiendanube", nombre:"Nube", costo:9000 },
  { id:"ml_flex",    nombre:"Flex", costo:7500 },
];
const empresaObj = id => EMPRESAS.find(e=>e.id===id) || EMPRESAS[0];
const canalObj   = id => CANALES.find(c=>c.id===id) || CANALES[0];
const canalDe    = p => (p&&p.canal) || empresaObj(p&&p.empresa).canalDefault;
const costoEnvio = p => canalObj(canalDe(p)).costo;
const STOCK_DUENO = "labs";   // Labs pone el stock compartido; las demás empresas le pagan lo que sacan
const fmtAr = n => "$"+Number(n||0).toLocaleString("es-AR");
/* Geo para la hoja de ruta: salida desde Puerto Madero + centro de cada barrio CABA */
const ORIGEN_CABA={nombre:"Puerto Madero, CABA",lat:-34.6118,lon:-58.3625};
const BARRIO_COORDS={
  "palermo":[-34.5780,-58.4250],"belgrano":[-34.5620,-58.4560],"caballito":[-34.6190,-58.4400],
  "san nicolás":[-34.6045,-58.3790],"centro":[-34.6045,-58.3790],"recoleta":[-34.5880,-58.3960],
  "núñez":[-34.5460,-58.4620],"nunez":[-34.5460,-58.4620],"villa crespo":[-34.5990,-58.4380],
  "almagro":[-34.6100,-58.4200],"flores":[-34.6280,-58.4640],"villa urquiza":[-34.5730,-58.4900],
  "colegiales":[-34.5740,-58.4500],"barracas":[-34.6470,-58.3820]
};
function coordsDe(p){ const k=(p.ciudad||"").toLowerCase().trim();
  for(const b in BARRIO_COORDS){ if(k.includes(b)) return BARRIO_COORDS[b]; }
  return [-34.6037,-58.3816]; }
function distKm(a,b){ const R=6371,p=Math.PI/180;
  const x=Math.sin((b[0]-a[0])*p/2)**2+Math.cos(a[0]*p)*Math.cos(b[0]*p)*Math.sin((b[1]-a[1])*p/2)**2;

    rest.forEach((s,i)=>{ const d=distKm(cur,coordsDe(s)); if(d<bd){bd=d;bi=i;} });

/* =========================================================================

   Regla simple: AMBA → cadete desde Bs As (mismo día / Flex).
   Otra provincia → correo (por defecto desde Bs As, que suele convenir).
   Es solo una sugerencia: el operador siempre puede cambiarla.
   ========================================================================= */
function sugerirRuta(provincia, ciudad){
  const t=((provincia||"")+" "+(ciudad||"")).toLowerCase();
  const esAMBA = /caba|capital federal|ciudad aut|ciudad de buenos aires/.test(t)
    || (/buenos aires/.test(t) && /(lan[uú]s|avellaneda|quilmes|san isidro|vicente l[oó]pez|mor[oó]n|matanza|tigre|lomas|san mart[ií]n|tres de febrero|berazategui|florencio varela|ituzaing[oó]|hurlingham|escobar|pilar|merlo|moreno|jos[eé] c\. paz|malvinas)/.test(t));
  if(esAMBA) return {metodo:"cadete",origen:"bsas"};            // AMBA: cadete propio / Flex
  if(/c[oó]rdoba/.test(t)) return {metodo:"correo",origen:"riotercero"}; // tu provincia: sale de RT
  return {metodo:"correo",origen:"bsas"};                        // resto del interior: conviene capital
}

    window.addEventListener("storage",e=>{ if(e.key===KEY) emit(); });

        a.push({id,...o}); write(a); emit(); return id; },
      async update(id,patch){ const a=read(); const i=a.findIndex(p=>p.id===id);
        if(i>=0){ a[i]={...a[i],...patch}; write(a); emit(); } },
      async get(id){ return read().find(p=>p.id===id)||null; },

async function descontarStockPedido(id){

/* Imputación: agrupa las salidas por venta según empresa + canal */
function imputacion(st){
  const sal=(st.movs||[]).filter(m=>m.tipo==="salida" && m.empresa);
  const g={};
  sal.forEach(m=>{ const k=(m.empresa||"?")+"|"+(m.canal||"?");
    if(!g[k]) g[k]={empresa:m.empresa,canal:m.canal,unidades:0,prods:{}};
    g[k].unidades+=m.cant; g[k].prods[m.prod]=(g[k].prods[m.prod]||0)+m.cant; });
  return Object.values(g).sort((a,b)=>b.unidades-a.unidades);
}
/* Lo que sacó cada empresa del pool, juntando canales (para la cuenta con el dueño del stock) */
function enRango(ts,desde,hasta){
  if(desde){ const d=new Date(desde+"T00:00:00").getTime(); if(ts<d) return false; }
  if(hasta){ const h=new Date(hasta+"T23:59:59").getTime(); if(ts>h) return false; }
  return true;
}
function imputacionEmp(st,desde,hasta){
  const g={};
  (st.movs||[]).filter(m=>m.empresa && enRango(m.ts,desde,hasta)).forEach(m=>{
    const e=m.empresa;
    if(!g[e]) g[e]={empresa:e,total:0,aporte:0,canales:{},prods:{}};
    if(m.tipo==="salida"){ g[e].total+=m.cant; const c=m.canal||"?"; g[e].canales[c]=(g[e].canales[c]||0)+m.cant; g[e].prods[m.prod]=(g[e].prods[m.prod]||0)+m.cant; }
    else if(m.tipo==="entrada"){ g[e].aporte+=m.cant; }
  });
  return Object.values(g).map(x=>({...x, saldo:x.total-x.aporte})).sort((a,b)=>b.total-a.total);
}
/* Cuenta corriente: retiros (debe) y aportes (haber) de una empresa, con saldo neto en unidades */
function cuentaCorriente(st,empresa,desde,hasta){
  const movs=(st.movs||[]).filter(m=>m.empresa===empresa && (m.tipo==="salida"||m.tipo==="entrada") && enRango(m.ts,desde,hasta))
    .sort((a,b)=>a.ts-b.ts);
  const retiro=movs.filter(m=>m.tipo==="salida").reduce((s,m)=>s+m.cant,0);
  const aporte=movs.filter(m=>m.tipo==="entrada").reduce((s,m)=>s+m.cant,0);
  return { movs, retiro, aporte, saldo:retiro-aporte };
}
/* Entradas/salidas de un producto (salidas separadas por empresa) */
function flujoProducto(prod, st){
  let ent=0,sal=0; const porEmp={};
  (st.movs||[]).filter(m=>m.prod===prod).forEach(m=>{
    if(m.tipo==="entrada") ent+=m.cant;
    else if(m.tipo==="salida"){ sal+=m.cant; if(m.empresa) porEmp[m.empresa]=(porEmp[m.empresa]||0)+m.cant; }
  });
  return {ent,sal,porEmp};
}

async function avanzar(id, nuevo, nota="", extra={}){
  const p=PEDIDOS.find(x=>x.id===id); if(!p) return;
  const eventos=(p.eventos||[]).concat([{estado:nuevo,ts:Date.now(),nota}]);
  await DB.update(id,{estado:nuevo,eventos,...extra});
  if(nuevo==="preparado") await descontarStockPedido(id);
  toast("Estado: "+estObj(nuevo).label);
}
async function asignarCadete(id,cadete){ await avanzar(id,"asignado","Asignado a "+cadete,{cadete}); }
async function crearPedido(d){
  const r=sugerirRuta(d.provincia,d.ciudad);
  const emp=empresaObj(d.empresa);
  const id=await DB.create({tipo:"pedido",empresa:emp.id,canal:d.canal||emp.canalDefault,ref:d.ref||"",
    cliente:d.cliente,tel:d.tel||"",dir:d.dir||"",ciudad:d.ciudad||"",provincia:d.provincia||"",
    items:d.items||"",origen:d.origen||r.origen,metodo:d.metodo||r.metodo,
    correo:d.correo||"",tracking:d.tracking||"",cadete:"",estado:"pendiente",creado:Date.now(),
    eventos:[{estado:"pendiente",ts:Date.now(),nota:"Pedido creado"}]});
  return id;
}
async function crearReabas(detalle){
  await DB.create({tipo:"reabastecimiento",detalle,estado:"prep_rt",creado:Date.now(),
    eventos:[{estado:"prep_rt",ts:Date.now(),nota:"Creado"}]});
  toast("Reabastecimiento creado");
}
async function avanzarReabas(id,nuevo){
  const p=PEDIDOS.find(x=>x.id===id); if(!p) return;
  const eventos=(p.eventos||[]).concat([{estado:nuevo,ts:Date.now(),nota:""}]);
  await DB.update(id,{estado:nuevo,eventos});
  toast("Reabastecimiento: "+reabasObj(nuevo).label);
}
function copiarLink(id){ const u=linkCliente(id);
  navigator.clipboard?.writeText(u).then(()=>toast("Link copiado"),()=>prompt("Link:",u)); }
function waCliente(id){ const p=PEDIDOS.find(x=>x.id===id); if(!p)return;
  const msg=`Hola ${p.cliente}! Acá podés seguir tu pedido ${p.id} en vivo y, cuando lo recibas, confirmar la recepción: ${linkCliente(id)}`;
  const tel=waTel(p.tel);
  window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`,"_blank"); }
/* Cadete: marca "en reparto" y abre WhatsApp avisando al cliente (desde el celu, un toque) */
function salirReparto(id){ const p=PEDIDOS.find(x=>x.id===id); if(!p)return;
  const msg=`Hola ${p.cliente}! Tu pedido ${p.id} ya salió y está en reparto. Seguilo en vivo y confirmá la recepción acá: ${linkCliente(id)}`;
  window.open(`https://wa.me/${waTel(p.tel)}?text=${encodeURIComponent(msg)}`,"_blank"); // sincrónico: evita bloqueo de popup
  avanzar(id,"en_reparto","Salió a repartir · avisado por WhatsApp"); }

function render(){
  const q=new URLSearchParams(location.search);
  const pid=q.get("p");
  if(pid){ ROL="cliente"; return vistaCliente(pid); }   // cliente: SIN login

  if(DB.modo==="firebase"){
    if(!AUTH_READY) return vistaCargando();
    if(!USER)       return vistaLogin();
    if(!USERROL)    return vistaSinAcceso();
    ROL=USERROL;                                          // rol real, desde la cuenta
  } else {
    if(!ROL){ const r=q.get("rol");                       // modo demo: rol por link
      if(r==="cadete"){ ROL="cadete"; const c=q.get("cadete"); if(c) CADETE_ACTIVO=decodeURIComponent(c); }
      else if(r==="operador"||r==="empleado"){ ROL="operador"; }
      else if(r==="admin"){ ROL="admin"; }
    }
    if(!ROL) return vistaInicio();
  }
  EMPLEADO=(ROL==="operador");
  const rb=$("#roleBtn"); if(rb){ rb.style.display=(ROL==="admin"||ROL==="sim"||DB.modo==="firebase")?"inline-block":"none"; rb.textContent=(DB.modo==="firebase"?"Salir":"Cambiar rol"); }
  if(ROL==="sim")      return vistaSimulacion();
  if(ROL==="admin"){
    if(PREVIEW==="operador"){ OPVIEW="preparacion"; vistaPreparacion(); return bannerPreview("Operador"); }
    if(PREVIEW==="cadete"){ if(!CADETE_ACTIVO){ vistaElegirCadete(); } else { vistaCadete(); } return bannerPreview("Reparto"); }
    return vistaOperador();
  }
  if(ROL==="operador"){ OPVIEW="preparacion"; return vistaPreparacion(); }
  if(ROL==="cadete")   return CADETE_ACTIVO?vistaCadete():vistaElegirCadete();
}

function parseTabla(texto){
  const lineas=texto.split(/\r?\n/).filter(l=>l.length);
  if(lineas.length<2) return [];
  const delim = lineas[0].includes("\t")?"\t" : (lineas[0].split(";").length>lineas[0].split(",").length?";":",");
  const split = l => { const out=[]; let cur="",q=false;       // CSV con comillas
    for(let i=0;i<l.length;i++){ const c=l[i];
      if(c==='"'){ q=!q; } else if(c===delim && !q){ out.push(cur); cur=""; } else cur+=c; }
    out.push(cur); return out.map(s=>s.trim().replace(/^"|"$/g,"")); };
  const heads = split(lineas[0]).map(h=>h.toLowerCase());
  const col = re => heads.findIndex(h=>re.test(h));
  const ix = {
    orden:  col(/n[uú]mero de orden|^orden|venta|pedido|^#/),
    cliente:col(/comprador|^cliente|destinatario|nombre para el env|^nombre$/),
    tel:    col(/tel[eé]fono/),
    dir:    col(/direcci/), num: col(/^n[uú]mero$/), piso: col(/piso/),
    loc:    col(/localidad/), ciudad: col(/ciudad/), prov: col(/provincia/),
    prod:   col(/nombre del producto|^producto|art[ií]culo|detalle|descripci/),
    cant:   col(/cantidad del producto|^cantidad/), sku: col(/sku/), envio: col(/medio de env[ií]o/),
    track:  col(/tracking|seguimiento/),
  };
  const g=(c,k)=> ix[k]>=0 ? (c[ix[k]]||"") : "";
  const groups=new Map(); let lastKey=null, seq=0;
  for(let i=1;i<lineas.length;i++){
    const c=split(lineas[i]); if(c.every(x=>!x)) continue;
    let key = ix.orden>=0 ? g(c,"orden") : "";
    if(key) lastKey=key; else key = lastKey || ("fila"+(++seq));   // ffill por orden
    if(!groups.has(key)) groups.set(key,{ref:key,cliente:"",tel:"",dir:"",loc:"",prov:"",envio:"",track:"",items:[]});
    const o=groups.get(key);
    const set=(k,v)=>{ if(v && !o[k]) o[k]=v; };
    set("cliente",g(c,"cliente")); set("tel",g(c,"tel")); set("prov",g(c,"prov"));
    set("envio",g(c,"envio")); set("track",g(c,"track"));
    set("loc", g(c,"loc")||g(c,"ciudad"));
    const calle=g(c,"dir"); if(calle && !o.dir) o.dir=(calle+" "+g(c,"num")+(g(c,"piso")?(" "+g(c,"piso")):"")).trim();
    const pn=g(c,"prod"); if(pn) o.items.push((g(c,"cant")||"1")+"x "+pn);
  }
  const out=[];
  for(const o of groups.values()){
    if(!o.cliente && !o.items.length) continue;
    const envL=o.envio.toLowerCase();
    const esCorreo=/correo|andreani|oca|cruz del sur|v[ií]a cargo|cl[aá]sico|expreso|retiro|moto.*correo/.test(envL);
    const r=sugerirRuta(o.prov,o.loc);
    out.push({ empresa:IMP_EMPRESA, ref:o.ref?("#"+o.ref.replace(/^#/,"")):"", cliente:o.cliente, tel:o.tel,
      dir:o.dir, ciudad:o.loc, provincia:o.prov, items:o.items.join(" · "),
      metodo: esCorreo?"correo":r.metodo, origen:r.origen,
      correo: esCorreo?(/retiro/.test(envL)?"Punto de retiro":(o.envio.match(/andreani|oca|correo argentino|cruz del sur|v[ií]a cargo/i)||["Correo Argentino"])[0]):"",
      tracking:o.track });
  }
  return out;
}

/* ---- Importar PDF de preparación de Tienda Nube (separa columnas por posición) ---- */
async function leerPDF(file){
  if(!file) return;
  if(typeof pdfjsLib==="undefined"){ toast("No se pudo cargar el lector de PDF. Probá con el CSV."); return; }
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const texto=await pdfTexto(file);
    IMP_FILAS=parsePDF(texto);
    if(!IMP_FILAS.length){ toast("No encontré órdenes en el PDF"); return; }
    mostrarPreviewImport();
  }catch(e){ toast("No pude leer el PDF"); }
}
async function pdfTexto(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const lineas=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const vp=page.getViewport({scale:1}); const mid=vp.width/2;
    const tc=await page.getTextContent();
    const items=tc.items.map(it=>({x:it.transform[4],y:it.transform[5],s:it.str})).filter(it=>it.s.trim());
    [0,1].forEach(c=>{
      const col=items.filter(it=>(it.x>=mid?1:0)===c);
      col.sort((a,b)=>(Math.round(b.y/3)-Math.round(a.y/3))||(a.x-b.x));
      let cy=null,line=[];
      col.forEach(it=>{ const yy=Math.round(it.y/3);
        if(cy===null||yy===cy){ line.push(it.s); } else { lineas.push(line.join(" ")); line=[it.s]; } cy=yy; });
      if(line.length) lineas.push(line.join(" "));
    });
  }
  return lineas.join("\n");
}
function parsePDF(text){
  const out=[]; const bloques=text.split(/(?=Orden #\d+)/);
  bloques.forEach(b=>{
    const mref=b.match(/Orden #(\d+)/); if(!mref) return;
    const L=b.split("\n").map(s=>s.trim());
    let i0=L.findIndex(l=>/^Producto/.test(l)); i0=i0<0?1:i0+1;
    let iend=L.findIndex(l=>/^Subtotal/.test(l)); if(iend<0) iend=L.length;
    const sec=L.slice(i0,iend);
    const qty=[],frags=[];
    sec.forEach((l,k)=>{ if(!l||/^SKU:/.test(l)) return;
      const m=l.match(/(\d+)\s*x\s*\$/);
      if(m){ qty.push({k,c:+m[1]}); const np=l.slice(0,m.index).trim(); if(np) frags.push({k,t:np}); }
      else frags.push({k,t:l}); });
    const prods=qty.map(q=>({c:q.c,n:[]}));
    if(prods.length) frags.forEach(fr=>{ let bi=0; for(let i=0;i<qty.length;i++){ if(qty[i].k<=fr.k) bi=i; } prods[bi].n.push(fr); });
    const items=prods.map(p=>p.c+"x "+p.n.sort((a,b)=>a.k-b.k).map(f=>f.t).join(" ").replace(/\s+/g," ").replace(/\s+,/g,",").trim()).join(" · ");
    let cli="",m=b.match(/Entregar a:\s*(.+)/); if(m) cli=m[1].trim();
    else { const ei=L.findIndex(l=>/^Enviar a:/.test(l)); if(ei>=0) for(let j=ei+1;j<L.length;j++){ if(L[j]){ cli=L[j]; break; } } }
    let tel=""; m=b.match(/Tel[eé]fono:\s*(.+)/); if(m) tel=m[1].trim(); if(/no informado/i.test(tel)) tel="";
    let prov="",loc="",dir="";
    for(let j=0;j<L.length;j++){ const mm=L[j].match(/^(.*),\s*([^,]+),\s*\d{3,4}$/);
      if(mm){ loc=mm[1].split(",").pop().trim(); prov=mm[2].trim(); if(j>0) dir=L[j-1]; break; } }
    const retiro=/Direcci[oó]n de retiro/i.test(b);
    const r=sugerirRuta(prov,loc);
    out.push({empresa:IMP_EMPRESA, ref:"#"+mref[1], cliente:cli, tel, dir, ciudad:loc, provincia:prov,
      items, metodo:"correo", origen:r.origen, correo:retiro?"Punto de retiro":"Correo Argentino"});
  });
  return out;
}

function procesarScan(code){
  if(!code||!code.trim()) return;
  const prod=prodPorBarcode(code);
  if(!prod){ toast("Código no reconocido: "+code); return; }
  const row=pickingConsolidado().find(r=>matchNombre(r.nombre,prod.nombre));
  if(!row){ toast(prod.nombre+": no está en el picking de hoy"); return; }
  const k=row.nombre.toLowerCase();
  PICK[k]=Math.min((PICK[k]||0)+1,row.cant);
  toast(prod.nombre+"  "+PICK[k]+"/"+row.cant);
  vistaPreparacion();
}

/* Marca un pedido como entregado a partir del código escaneado (barcode o QR) */
function confirmarPorCodigo(code){
  if(!code) return false;
  code=String(code).trim();
  const m=code.match(/[?&]p=([^&]+)/); if(m) code=decodeURIComponent(m[1]); // si escanea el QR de seguimiento
  const U=code.toUpperCase().replace(/^#/,"");
  const p=PEDIDOS.find(x=>(x.id||"").toUpperCase()===U)||PEDIDOS.find(x=>(x.ref||"").toUpperCase().replace(/^#/,"")===U);
  if(!p){ toast("No encontré el paquete "+code); return false; }
  if(["entregado","confirmado"].includes(p.estado)){ toast(p.id+" ya estaba entregado"); return true; }
  avanzar(p.id,"entregado","Entregado · escaneado por el cadete");
  toast("Entregado: "+p.id+" — tocá WhatsApp para avisar al cliente");
  return true;
}
/* Abre la cámara y escanea el código del paquete para confirmar la entrega */
async function escanearEntrega(){
  const soportado = ("BarcodeDetector" in window) && navigator.mediaDevices && navigator.mediaDevices.getUserMedia;
  if(!soportado){
    const c=prompt("Tu teléfono no soporta escaneo con cámara. Ingresá o pegá el número del paquete:");
    if(c) confirmarPorCodigo(c);
    return;
  }
  let stream;
  try{ stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}); }
  catch(e){ toast("No pude abrir la cámara. Revisá los permisos."); return; }
  const ov=document.createElement("div"); ov.className="scan-ov";
  ov.innerHTML=`<video class="scan-vid" autoplay playsinline muted></video>
    <div class="scan-frame"></div>
    <div class="scan-hint">Apuntá al código de barras del paquete</div>
    <button class="btn scan-x">Cerrar</button>`;
  document.body.appendChild(ov);
  const vid=ov.querySelector("video"); vid.srcObject=stream;
  const det=new BarcodeDetector({formats:["code_128","qr_code","ean_13","code_39"]});
  let stop=false;
  const cerrar=()=>{ if(stop)return; stop=true; try{stream.getTracks().forEach(t=>t.stop());}catch(e){} ov.remove(); };
  ov.querySelector(".scan-x").onclick=cerrar;
  async function loop(){
    if(stop) return;
    try{ const codes=await det.detect(vid);
      if(codes&&codes.length){ const raw=codes[0].rawValue||""; cerrar(); confirmarPorCodigo(raw); return; } }
    catch(e){}
    requestAnimationFrame(loop);
  }
  vid.onloadedmetadata=()=>loop();
}

/* --- Código de barras Code128 (vectorial: escanea siempre, sin internet) --- */
const C128=["212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"];
function code128B(text){
  const vals=[104]; let sum=104,pos=1;            // Start B
  for(const ch of String(text)){ let v=ch.charCodeAt(0)-32; if(v<0||v>94) v=0;
    vals.push(v); sum+=v*pos; pos++; }
  vals.push(sum%103); vals.push(106);             // checksum + Stop
  return vals.map(v=>C128[v]).join("");
}
function barcodeSVG(text,h){ h=h||44;
  const w=code128B(text); let x=0,total=0,rects="";
  for(let i=0;i<w.length;i++) total+=+w[i];
  for(let i=0;i<w.length;i++){ const n=+w[i];
    if(i%2===0) rects+=`<rect x="${x}" y="0" width="${n}" height="${h}" fill="#000"/>`; x+=n; }
  return `<svg class="bc" viewBox="0 0 ${total} ${h}" preserveAspectRatio="none">${rects}</svg>`;
}

function simPlay(){ if(SIM_TIMER){ stopPlay(); vistaSimulacion(); return; }
  SIM_TIMER=setInterval(()=>{ if(SIM_STEP>=simPasos().length-1){ stopPlay(); vistaSimulacion(); } else simNext(); },1700);
  vistaSimulacion(); }
function vistaSimulacion(){
  if(ROL!=="sim") return;
  if(!SIM) SIM=simOrden();
  const ps=simPasos(), step=ps[SIM_STEP], fl=flujo(SIM), actual=idxEst(SIM);
  const tl=fl.map((eid,i)=>{ const e=estObj(eid); const cls=i<actual?"done":i===actual?"current":"pending";
    return `<div class="step ${cls}"><div class="pt"></div><div class="s-t">${e.label}</div></div>`; }).join("");
  app().innerHTML=`
    <div class="title">Simulación del ciclo</div>
    <div class="subtitle">Mirá cómo viaja un pedido de punta a punta</div>
    <div class="seg" style="margin-bottom:16px">
      <button class="${SIM_METODO==='cadete'?'on':''}" onclick="setSimMetodo('cadete')">Cadete (AMBA)</button>
      <button class="${SIM_METODO==='correo'?'on':''}" onclick="setSimMetodo('correo')">Correo (interior)</button>
    </div>
    <div class="card">
      <div class="row" style="gap:8px">
        <span class="chip">${esc(step.rol)}</span>
        <span class="badge"><span class="dot" style="background:${estObj(step.estado).color}"></span>${estObj(step.estado).label}</span>
      </div>
      <div style="font-size:22px;font-weight:700;letter-spacing:-.01em;margin-top:12px">${esc(step.t)}</div>
      <div class="muted" style="margin-top:4px">${esc(step.actor)} · ${esc(step.d)}</div>
      ${step.etiqueta?`<div style="margin-top:16px"><style>${ETQ_CSS}</style>
        <div style="height:calc(${LABEL_MM.h}mm * .72);overflow:hidden"><div style="transform:scale(.72);transform-origin:top left;width:${LABEL_MM.w}mm">${etiquetaBody(SIM)}</div></div>
        <button class="btn sm" style="margin-top:12px" onclick="imprimirEtiqueta('${SIM.id}')">${icon('printer')}Imprimir etiqueta</button></div>`:""}
      ${step.foto?`<div class="proof" style="margin-top:16px"><span class="label">Foto de comprobante</span>
        <div style="height:140px;border-radius:12px;border:.5px dashed var(--border-2);display:flex;align-items:center;justify-content:center;color:var(--text-3)">Acá el cadete saca la foto</div></div>`:""}
      ${step.cliente?`<div style="margin-top:16px"><button class="btn green block" onclick="simNext()">Sí, lo recibí ✓ <span class="muted" style="font-size:13px">(lo toca el cliente)</span></button></div>`:""}
    </div>
    <div class="row" style="margin:16px 0;justify-content:center">
      <button class="btn ghost sm" onclick="simPrev()">← Anterior</button>
      <button class="btn" onclick="simPlay()">${SIM_TIMER?"Pausar":"Reproducir todo"}</button>
      <button class="btn ghost sm" onclick="simNext()">Siguiente →</button>
      <button class="btn ghost sm" onclick="simReset()">Reiniciar</button>
    </div>
    <div class="card"><span class="label">Recorrido</span><div class="tl">${tl}</div></div>
    <p class="center muted" style="margin-top:14px;font-size:13px">Paso ${SIM_STEP+1} de ${ps.length}</p>`;
}

/* =========================================================================
   10) ARRANQUE
   ========================================================================= */
(function start(){
  initDB();
  const q=new URLSearchParams(location.search);
  const esCliente=!!q.get("p");
  if(esCliente){
    if(DB.modo!=="firebase") DB.subscribe(d=>{ PEDIDOS=d; render(); });
    render();                                  // vistaCliente lee su pedido con DB.get
  } else if(DB.modo==="firebase"){
    firebase.auth().onAuthStateChanged(async (user)=>{
      USER=user; USERROL=null; CADETE_ACTIVO=null;
      if(user){
        try{ const d=await firebase.firestore().collection("usuarios").doc(user.email).get();
          if(d.exists){ USERROL=d.data().rol||null;
            if(USERROL==="cadete") CADETE_ACTIVO=d.data().cadete||d.data().nombre||null; }
        }catch(e){ USERROL=null; }
        if(USERROL && !SUBSCRITO){ SUBSCRITO=true; DB.subscribe(d=>{ PEDIDOS=d; render(); }); }
      }
      AUTH_READY=true; render();
    });
  } else {
    DB.subscribe(d=>{ PEDIDOS=d; render(); });
    render();
  }
})();
</script>
