<!DOCTYPE html>
<html lang="es-AR">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
/* =========================================================================
   TOKENS — estilo Apple. Una sola fuente de verdad para color, tipo y medida.
   ========================================================================= */
:root{
  --bg:#fff;--bg-2:#f5f5f7;--bg-3:#ececf1;
  --text:#1d1d1f;--text-2:#6e6e73;--text-3:#a1a1a8;
  --border:rgba(0,0,0,.07);--border-2:rgba(0,0,0,.14);
  --accent:#0071e3;--accent-weak:rgba(0,113,227,.12);
  --green:#2fb350;--green-weak:rgba(47,179,80,.14);
  --amber:#f59300;--amber-weak:rgba(245,147,0,.15);
  --violet:#a855f7;--violet-weak:rgba(168,85,247,.14);
  --red:#ff3b30;
  --r-card:20px;--r-inp:12px;--r-pill:980px;--r-chip:8px;
  --sh-sm:0 1px 2px rgba(0,0,0,.05),0 0 0 .5px rgba(0,0,0,.04);
  --sh-md:0 6px 22px rgba(0,0,0,.10),0 1px 3px rgba(0,0,0,.06);
  --fs:-apple-system,"SF Pro Display","SF Pro Text","Inter",system-ui,sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#000;--bg-2:#161618;--bg-3:#242427;
  --text:#f5f5f7;--text-2:#a1a1a8;--text-3:#6e6e73;
  --border:rgba(255,255,255,.10);--border-2:rgba(255,255,255,.20);
  --accent:#2997ff;--accent-weak:rgba(41,151,255,.18);
  --sh-sm:0 0 0 .5px rgba(255,255,255,.06);
  --sh-md:0 10px 30px rgba(0,0,0,.5);
}}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:var(--fs);font-size:17px;line-height:1.5;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh}
button,input,select,textarea{font-family:inherit;font-size:17px;color:inherit}
button{cursor:pointer;border:none;background:none}
a{color:var(--accent);text-decoration:none}
.ico{width:18px;height:18px;flex:none;vertical-align:-3px}

/* ---- Navbar con logo ---- */
.nav{position:sticky;top:0;z-index:50;height:56px;display:flex;align-items:center;gap:12px;
  padding:0 20px;background:color-mix(in srgb,var(--bg) 72%,transparent);
  backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);
  border-bottom:.5px solid var(--border)}
.logo{display:flex;align-items:center;gap:10px}
.logo .mark{width:30px;height:30px;border-radius:9px;background:linear-gradient(145deg,var(--accent),color-mix(in srgb,var(--accent) 60%,#000));
  display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--sh-sm)}
.logo .mark .ico{width:18px;height:18px}
.logo .txt{font-weight:680;letter-spacing:-.02em;font-size:17px;line-height:1}
.logo .txt small{display:block;font-size:10.5px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;color:var(--text-2);margin-top:2px}
.nav .sp{flex:1}
.nav .role-pill{font-size:13px;font-weight:500;color:var(--text-2);background:var(--bg-2);
  padding:7px 14px;border-radius:var(--r-pill);border:.5px solid var(--border);transition:.2s}
.nav .role-pill:hover{color:var(--text);border-color:var(--border-2)}

.wrap{max-width:1040px;margin:0 auto;padding:28px 20px 100px}
.title{font-size:34px;font-weight:700;letter-spacing:-.025em;line-height:1.05;margin-bottom:6px}
.subtitle{color:var(--text-2);font-size:17px;margin-bottom:26px}
.label{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--text-2);margin-bottom:9px;display:block}

/* ---- Cards ---- */
.card{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:22px;box-shadow:var(--sh-sm)}
.grid{display:grid;gap:12px}
.cardgrid{display:grid;gap:14px;grid-template-columns:1fr}
.cardgrid .order{margin-bottom:0}
@media(min-width:900px){.cardgrid{grid-template-columns:1fr 1fr}}

/* ---- KPIs ---- */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
.kpi{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:18px;box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.kpi .ico{position:absolute;top:16px;right:16px;color:var(--text-3);width:19px;height:19px}
.kpi .n{font-size:38px;font-weight:700;letter-spacing:-.03em;line-height:1;
  font-variant-numeric:tabular-nums}
.kpi .l{font-size:12.5px;color:var(--text-2);margin-top:8px;font-weight:450}
.kpi.accent .n{color:var(--accent)}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}.kpi .n{font-size:32px}}

/* ---- Panel (dashboard) ---- */
.hero{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:30px 26px;box-shadow:var(--sh-sm);margin-bottom:12px}
.hero .n{font-size:52px;font-weight:700;letter-spacing:-.035em;line-height:1;font-variant-numeric:tabular-nums}
.hero .c{color:var(--text-2);font-size:15px;margin-top:10px}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
@media(max-width:640px){.tiles{grid-template-columns:repeat(2,1fr)}}
.tile{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:18px;box-shadow:var(--sh-sm);cursor:pointer;text-align:left;
  transition:transform .12s ease,border-color .2s,box-shadow .2s;display:flex;flex-direction:column;gap:10px;min-height:108px}
.tile:hover{border-color:var(--border-2);box-shadow:var(--sh-md);transform:translateY(-2px)}
.tile:active{transform:scale(.98)}
.tile .ico{width:22px;height:22px;color:var(--accent)}
.tile .tn{font-size:17px;font-weight:600;letter-spacing:-.01em}
.tile .ts{font-size:13px;color:var(--text-2);margin-top:auto}
.tile .badge-n{font-size:13px;font-weight:700;color:var(--accent)}

/* ---- Importar: zona de carga ---- */
.dropzone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center;
  border:1.5px dashed var(--border-2);border-radius:var(--r-card);padding:36px 20px;cursor:pointer;
  background:var(--bg-2);transition:border-color .2s,background .2s,transform .12s;color:var(--text-2)}
.dropzone:hover{border-color:var(--accent)}
.dropzone:active{transform:scale(.99)}
.dropzone.over{border-color:var(--accent);background:var(--accent-weak)}
.dropzone svg{width:28px;height:28px;color:var(--accent)}
.dropzone .dz-t{font-size:16px;font-weight:600;color:var(--text)}
.dropzone .dz-s{font-size:13px}

/* ---- Escáner de entrega (cadete) ---- */
.scan-ov{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center}
.scan-vid{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.scan-frame{position:relative;width:78%;max-width:320px;height:150px;border:3px solid #fff;border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.45)}
.scan-hint{position:absolute;left:0;right:0;bottom:118px;color:#fff;font-size:16px;font-weight:600;text-align:center;padding:0 24px}
.scan-x{position:absolute;bottom:40px;left:50%;transform:translateX(-50%)}
.scan-last{position:absolute;left:0;right:0;bottom:92px;color:#7CFC98;font-size:15px;font-weight:700;text-align:center}

/* ---- Inputs ---- */
.field{margin-bottom:16px}
input,select,textarea{width:100%;background:var(--bg);border:.5px solid var(--border-2);
  border-radius:var(--r-inp);padding:12px 14px;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-weak)}
textarea{resize:vertical;min-height:66px;font-size:15px;line-height:1.5}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.two{grid-template-columns:1fr}}

/* ---- Botones ---- */
.btn{background:var(--accent);color:#fff;border-radius:var(--r-pill);padding:12px 20px;
  font-weight:590;letter-spacing:-.01em;transition:opacity .2s,transform .08s,box-shadow .2s;
  display:inline-flex;align-items:center;gap:8px;justify-content:center;box-shadow:var(--sh-sm)}
.btn:hover{opacity:.88}.btn:active{transform:scale(.97)}
.btn .ico{width:17px;height:17px}
.btn.block{width:100%}
.btn.ghost{background:var(--bg-3);color:var(--text);box-shadow:none}
.btn.ghost:hover{background:var(--border-2);opacity:1}
.btn.green{background:var(--green)}.btn.amber{background:var(--amber);color:#1d1d1f}.btn.red{background:var(--red)}
.btn.sm{padding:9px 15px;font-size:14px}
.btn.sm .ico{width:15px;height:15px}

/* ---- Segmented control ---- */
.seg{display:flex;background:var(--bg-3);border-radius:var(--r-pill);padding:3px;gap:2px;
  max-width:100%;min-width:0;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.seg::-webkit-scrollbar{display:none}
.seg button{padding:8px 18px;border-radius:var(--r-pill);font-size:14px;font-weight:540;flex:0 0 auto;white-space:nowrap;
  color:var(--text-2);transition:.18s;display:inline-flex;align-items:center;gap:6px}
.seg button.on{background:var(--bg);color:var(--text);box-shadow:var(--sh-sm)}
@media(prefers-color-scheme:dark){.seg button.on{background:var(--bg-3)}}

/* ---- Lista de pedidos ---- */
.order{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:14px 16px;margin-bottom:12px;box-shadow:var(--sh-sm);
  transition:border-color .2s,transform .15s,box-shadow .2s}
.order:hover{border-color:var(--border-2);box-shadow:var(--sh-md)}
.ord-head{display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.ord-name{display:flex;align-items:center;gap:8px;min-width:0}
.ord-cli{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ord-sub{color:var(--text-2);font-size:12.5px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ord-chev{flex:0 0 auto;color:var(--text-3);font-size:15px;font-weight:800;width:20px;text-align:center}
.ord-body{margin-top:13px;border-top:.5px solid var(--border);padding-top:12px}
.order .top{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.order .code{font-weight:700;letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.order .who{color:var(--text-2);font-size:15px}
.order .addr{color:var(--text-2);font-size:14px;margin:5px 0 12px;line-height:1.45}
.order .acts{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}

/* ---- Badges / chips ---- */
.badge{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:540;
  background:var(--bg);border:.5px solid var(--border);padding:5px 12px;border-radius:var(--r-pill)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text-3);flex:none}
.chip{font-size:10.5px;font-weight:680;letter-spacing:.04em;padding:4px 9px;border-radius:var(--r-chip);
  background:var(--bg-3);color:var(--text-2);text-transform:uppercase;display:inline-flex;align-items:center;gap:5px}
.chip .ico{width:12px;height:12px}
.chip.flex{background:var(--amber-weak);color:var(--amber)}
.chip.tn{background:var(--accent-weak);color:var(--accent)}
.chip.correo{background:var(--violet-weak);color:var(--violet)}
.chip.cadete{background:var(--green-weak);color:var(--green)}
.tag{font-size:10.5px;font-weight:680;letter-spacing:.05em;text-transform:uppercase;
  color:var(--text-2);background:var(--bg-3);padding:3px 8px;border-radius:6px}

/* ---- Timeline ---- */
.tl{position:relative;margin:22px 0 4px;padding-left:32px}
.tl::before{content:"";position:absolute;left:9px;top:8px;bottom:8px;width:2px;background:var(--bg-3)}
.tl .step{position:relative;padding:0 0 24px}
.tl .step:last-child{padding-bottom:0}
.tl .step .pt{position:absolute;left:-32px;top:0;width:20px;height:20px;border-radius:50%;
  background:var(--bg);border:2px solid var(--bg-3);transition:.25s}
.tl .step.done .pt{background:var(--green);border-color:var(--green)}
.tl .step.current .pt{background:var(--accent);border-color:var(--accent);
  box-shadow:0 0 0 5px var(--accent-weak)}
.tl .step .s-t{font-weight:590;letter-spacing:-.01em}
.tl .step.pending .s-t{color:var(--text-3);font-weight:500}
.tl .step .s-d{font-size:14px;color:var(--text-2);margin-top:2px}
.tl .step .s-ts{font-size:12px;color:var(--text-3);margin-top:4px;font-variant-numeric:tabular-nums}

/* ---- Pantalla inicial ---- */
.roles{display:grid;gap:14px;max-width:440px;margin:36px auto 0}
.role-card{background:var(--bg-2);border:.5px solid var(--border);border-radius:var(--r-card);
  padding:20px;text-align:left;display:flex;align-items:center;gap:16px;box-shadow:var(--sh-sm);
  transition:border-color .2s,transform .15s,box-shadow .2s}
.role-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--sh-md)}
.role-card:active{transform:scale(.99)}
.role-card .rc-ico{width:48px;height:48px;border-radius:13px;background:var(--accent-weak);color:var(--accent);
  display:flex;align-items:center;justify-content:center;flex:none}
.role-card .rc-ico .ico{width:24px;height:24px}
.role-card h3{font-size:19px;letter-spacing:-.01em}
.role-card p{color:var(--text-2);font-size:14px;margin-top:3px;line-height:1.4}
.role-card .rc-go{margin-left:auto;color:var(--text-3)}

/* ---- Estado vacío ---- */
.empty{text-align:center;padding:48px 20px;color:var(--text-2)}
.empty .e-ico{width:56px;height:56px;border-radius:16px;background:var(--bg-2);border:.5px solid var(--border);
  color:var(--text-3);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.empty .e-ico .ico{width:26px;height:26px}
.empty p{font-size:15px}

.muted{color:var(--text-2)}.center{text-align:center}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.hide{display:none!important}
hr{border:none;border-top:.5px solid var(--border);margin:20px 0}
.proof img{max-width:100%;border-radius:14px;margin-top:10px;border:.5px solid var(--border)}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filters button{white-space:nowrap;font-size:14px;font-weight:500;padding:8px 15px;border-radius:var(--r-pill);
  background:var(--bg-2);border:.5px solid var(--border);color:var(--text-2);transition:.18s}
.filters button:hover{border-color:var(--border-2)}
.filters button.on{background:var(--text);color:var(--bg);border-color:transparent}
.hint{font-size:13.5px;color:var(--text-2);background:var(--bg);border:.5px solid var(--border);
  border-radius:14px;padding:12px 14px;margin-top:8px;line-height:1.5}

#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--text);color:var(--bg);padding:13px 22px;border-radius:var(--r-pill);font-size:15px;
  font-weight:540;opacity:0;transition:.3s cubic-bezier(.2,.8,.2,1);z-index:200;pointer-events:none;
  max-width:90vw;text-align:center;box-shadow:var(--sh-md)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

function distKm(a,b){ const R=6371,p=Math.PI/180;
  const x=Math.sin((b[0]-a[0])*p/2)**2+Math.cos(a[0]*p)*Math.cos(b[0]*p)*Math.sin((b[1]-a[1])*p/2)**2;
  return 2*R*Math.asin(Math.sqrt(x))*1.3; }                 // x1.3 ≈ distancia por calle

  const out=[]; let cur=[ORIGEN_CABA.lat,ORIGEN_CABA.lon]; const rest=stops.slice();
  while(rest.length){ let bi=0,bd=1e9;
    rest.forEach((s,i)=>{ const d=distKm(cur,coordsDe(s)); if(d<bd){bd=d;bi=i;} });
    const s=rest.splice(bi,1)[0]; s._km=Math.round(bd*10)/10; out.push(s); cur=coordsDe(s); }
  return out; }

/* Elige el producto del catálogo que MEJOR coincide con el nombre de un item (para descontar del correcto).
   Prioriza coincidencia exacta y castiga los productos con palabras de más (kits/variantes). */
function mejorProducto(nombreItem){
  const norm=s=>(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9ñ ]/g," ").replace(/\s+/g," ").trim();
  const words=s=>norm(s).split(" ").filter(w=>w.length>=3);
  const ni=norm(nombreItem), wi=words(nombreItem);
  if(!ni) return null;
  let best=null, bestScore=-1e9;
  for(const p of PRODUCTOS){
    const np=norm(p.nombre);
    if(np===ni) return p;                                   // coincidencia exacta
    const wp=words(p.nombre); let shared=0;
    wp.forEach(w=>{ if(wi.includes(w)) shared++; });
    if(!shared) continue;
    const cov=shared/Math.max(1,wi.length);                 // qué parte del nombre buscado está en el producto
    let score=cov*10 + shared*2 - (wp.length-shared)*0.3;   // premia cobertura y coincidencia; castiga suave las de más
    if(wp[0] && wp[0]===wi[0]) score+=5;                     // el producto empieza con la misma palabra
    if(/\bcon\b|\+|pack|combo|\bkit\b/.test(np)) score-=4;   // castiga combos cuando buscás un producto simple
    if(score>bestScore){ bestScore=score; best=p; }
  }
  return (best && bestScore>=3) ? best : null;               // umbral para no matchear cualquier cosa
}

/* =========================================================================
   3) SUGERENCIA DE RUTA
   Regla simple: AMBA → cadete desde Bs As (mismo día / Flex).
   Otra provincia → correo (por defecto desde Bs As, que suele convenir).
   Es solo una sugerencia: el operador siempre puede cambiarla.
   ========================================================================= */
function sugerirRuta(provincia, ciudad){
  const t=((provincia||"")+" "+(ciudad||"")).toLowerCase();
  const esAMBA = /caba|capital federal|ciudad aut|ciudad de buenos aires/.test(t)
    || (/buenos aires/.test(t) && /(lan[uú]s|avellaneda|quilmes|san isidro|vicente l[oó]pez|mor[oó]n|matanza|tigre|lomas|san mart[ií]n|tres de febrero|berazategui|florencio varela|ituzaing[oó]|hurlingham|escobar|pilar|merlo|moreno|jos[eé] c\. paz|malvinas)/.test(t));
  if(esAMBA) return {metodo:"cadete",origen:"bsas"};            // AMBA: cadete propio / Flex
  if(/c[oó]rdoba/.test(t)) return {metodo:"correo",origen:"riotercero"}; // tu provincia: sale de RT
  return {metodo:"correo",origen:"bsas"};                        // resto del interior: conviene capital
}

let DB;
function initDB(){
  const ok = FIREBASE_CONFIG && FIREBASE_CONFIG.projectId && typeof firebase!=="undefined";
  if(ok){
    firebase.initializeApp(FIREBASE_CONFIG);
    const col=firebase.firestore().collection("pedidos");
    DB={ modo:"firebase",
      subscribe(cb){ col.onSnapshot(s=>{ const a=s.docs.map(d=>({id:d.id,...d.data()}));
        a.sort((x,y)=>(y.creado||0)-(x.creado||0)); cb(a); }); },   // sin orderBy: los docs sin fecha (stock) también llegan
      async create(o){ if(o.creado==null) o.creado=Date.now(); return (await col.add(o)).id; },
      async update(id,patch){ await col.doc(id).update(patch); },
      async delete(id){ await col.doc(id).delete(); },
      async get(id){ const d=await col.doc(id).get(); return d.exists?{id:d.id,...d.data()}:null; } };
  } else {
    const KEY="despacho_v6";
    const read=()=>{ try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]} };
    const write=a=>localStorage.setItem(KEY,JSON.stringify(a));
    let L=[], seq=0; const emit=()=>{ const a=read().sort((x,y)=>y.creado-x.creado); L.forEach(f=>f(a)); };
    window.addEventListener("storage",e=>{ if(e.key===KEY) emit(); });
    DB={ modo:"demo",
      subscribe(cb){ L.push(cb); emit(); },
      async create(o){ const a=read(); const id=(o.tipo==="reabastecimiento"?"R":"P")+Date.now().toString(36).toUpperCase()+(seq++).toString(36).toUpperCase();
        a.push({id,...o}); write(a); emit(); return id; },
      async update(id,patch){ const a=read(); const i=a.findIndex(p=>p.id===id);
        if(i>=0){ a[i]={...a[i],...patch}; write(a); emit(); } },
      async delete(id){ const a=read(); const i=a.findIndex(p=>p.id===id); if(i>=0){ a.splice(i,1); write(a); emit(); } },
      async get(id){ return read().find(p=>p.id===id)||null; },
      reset(blank){ localStorage.removeItem(KEY); if(blank){localStorage.setItem("despacho_blank","1");} else {localStorage.removeItem("despacho_blank"); sembrarDemo(write,read);} emit(); } };
    if(read().length===0 && !localStorage.getItem("despacho_blank")) sembrarDemo(write,read);
  }
}

/* Fusiona todos los registros de stock duplicados en uno solo (los extra quedan anulados) */
async function repararStock(){
  const docs=PEDIDOS.filter(p=>p.tipo==="stock");
  if(docs.length<=1){ toast("El stock está sano (un solo registro)"); return; }
  const main=stockRecord();
  const movs=[...(main.movs||[])], vistos=new Set(movs.map(m=>m.ts+"|"+m.prod+"|"+m.tipo+"|"+m.cant));
  let min={...(main.min||{})}, zonas=main.zonas, margen=main.margen, correoGestion=main.correoGestion, descontar=main.descontar;
  for(const d of docs){ if(d.id===main.id) continue;
    (d.movs||[]).forEach(m=>{ const k=m.ts+"|"+m.prod+"|"+m.tipo+"|"+m.cant; if(!vistos.has(k)){ vistos.add(k); movs.push(m); } });
    min=Object.assign({},d.min||{},min); if(zonas==null)zonas=d.zonas; if(margen==null)margen=d.margen;
    if(correoGestion==null)correoGestion=d.correoGestion; if(descontar==null)descontar=d.descontar;
  }
  movs.sort((a,b)=>(a.ts||0)-(b.ts||0));
  const data={min,movs}; if(zonas!=null)data.zonas=zonas; if(margen!=null)data.margen=margen;
  if(correoGestion!=null)data.correoGestion=correoGestion; if(descontar!=null)data.descontar=descontar;
  await DB.update(main.id,data);
  for(const d of docs){ if(d.id!==main.id) await DB.update(d.id,{tipo:"stock_viejo",movs:[]}); }
  toast("Stock reparado: "+(docs.length-1)+" registro(s) duplicado(s) fusionado(s) ✅");
  setTimeout(()=>vistaOperador(),700);
}
function stockState(){
  const r=stockRecord()||{}; let min={...(r.min||{})}, movs=(r.movs||[]).slice();
  if(r.data){ for(const k in r.data){ const v=r.data[k]||{};   // migra formato viejo
    if(v.min) min[k]=v.min;
    if(v.cant) movs.push({ts:Date.now(),prod:k,tipo:"inicial",cant:v.cant,motivo:"Saldo inicial"}); } }
  return {min,movs,descontar:r.descontar,zonas:r.zonas,margen:r.margen,correoGestion:r.correoGestion};
}

async function persistStock(st){ const r=stockRecord();
  const data={min:st.min,movs:st.movs};
  if(st.descontar!==undefined) data.descontar=st.descontar;   // solo si está definido (undefined = ON por defecto)

  if(st.margen!==undefined && st.margen!==null) data.margen=st.margen;
  if(st.correoGestion!==undefined && st.correoGestion!==null) data.correoGestion=st.correoGestion;

/* Imputación: agrupa las salidas por venta según empresa + canal */
function imputacion(st){
  const sal=(st.movs||[]).filter(m=>m.tipo==="salida" && m.empresa);
  const g={};
  sal.forEach(m=>{ const k=(m.empresa||"?")+"|"+(m.canal||"?");
    if(!g[k]) g[k]={empresa:m.empresa,canal:m.canal,unidades:0,prods:{}};
    g[k].unidades+=m.cant; g[k].prods[m.prod]=(g[k].prods[m.prod]||0)+m.cant; });
  return Object.values(g).sort((a,b)=>b.unidades-a.unidades);
}
/* Lo que sacó cada empresa del pool, juntando canales (para la cuenta con el dueño del stock) */
function enRango(ts,desde,hasta){
  if(desde){ const d=new Date(desde+"T00:00:00").getTime(); if(ts<d) return false; }
  if(hasta){ const h=new Date(hasta+"T23:59:59").getTime(); if(ts>h) return false; }
  return true;
}

function salidasResumen(desde,hasta){
  const st=stockState();
  const sal=(st.movs||[]).filter(m=>m.tipo==="salida" && enRango(m.ts,desde,hasta));
  const porProd={};
  sal.forEach(m=>{ const k=m.prod; if(!porProd[k]) porProd[k]={prod:k,total:0,porEmp:{}};
    porProd[k].total+=m.cant; const e=m.empresa||"—"; porProd[k].porEmp[e]=(porProd[k].porEmp[e]||0)+m.cant; });
  const lista=Object.values(porProd).sort((a,b)=>b.total-a.total);
  const totEmp={}; sal.forEach(m=>{ const e=m.empresa||"—"; totEmp[e]=(totEmp[e]||0)+m.cant; });
  return {lista, total:sal.reduce((s,m)=>s+m.cant,0), totEmp};
}

/* Fecha en que se entregó un pedido (del historial de eventos) */
function fechaEntrega(p){
  const ev=(p.eventos||[]).filter(e=>e.estado==="entregado"||e.estado==="confirmado").pop();
  return ev?ev.ts:(p.creado||Date.now());
}
function entregadosEn(desde,hasta){
  return soloPedidos().filter(p=>["entregado","confirmado","finalizado"].includes(p.estado))
    .map(p=>({p, fe:fechaEntrega(p)}))
    .filter(x=>enRango(x.fe,desde,hasta))
    .sort((a,b)=>b.fe-a.fe);
}
/* Cobro de reparto: lo que Fullminet le cobra a cada empresa según la zona */
let COB_DESDE="", COB_HASTA="";
function catPedido(p){
  if(p.zonaFija!=null && p.zonaFija!==""){ const n=+p.zonaFija; return n===0?"caba":(n>=1&&n<=3)?String(n):"correo"; }
  if(p.metodo==="correo") return "correo"; const an=anilloDe(p);
  if(an.n===0) return "caba"; if(an.n>=1&&an.n<=3) return String(an.n); return "correo"; }
const COB_ET={caba:"CABA","1":"Zona 1","2":"Zona 2","3":"Zona 3",correo:"Correo",revisar:"A revisar"};
let COB_VERPAGADOS=false;
function facturable(p){
  if(p.estado==="finalizado"||p.estado==="anulado") return false;
  if(p.metodo==="correo") return ["despachado","en_camino","entregado","confirmado"].includes(p.estado);  // correo: se factura al despachar
  return ["entregado","confirmado"].includes(p.estado);                                                    // cadete: al entregar
}
function fechaFacturable(p){
  const ev=(p.eventos||[]).filter(e=>["entregado","confirmado","despachado"].includes(e.estado)).pop();
  return ev?ev.ts:(p.creado||Date.now());
}
function cobroReparto(desde,hasta){
  const proc=soloPedidos().filter(p=>
    (COB_VERPAGADOS ? (p.pagado && p.estado!=="anulado") : (facturable(p) && !p.pagado))
    && enRango(fechaFacturable(p),desde,hasta));
  const byEmp={};
  proc.forEach(p=>{ const e=p.empresa; if(!byEmp[e]) byEmp[e]={empresa:e,pedidos:[],total:0,costo:0};
    const c=catPedido(p), precio=precioCat(c), costo=(zonaCosto()[c]||0);
    byEmp[e].total+=precio; byEmp[e].costo+=costo;
    byEmp[e].pedidos.push({id:p.id, ref:codigoOrden(p), cliente:p.cliente||"—", cat:c, zona:COB_ET[c], destino:(p.ciudad||"")+(p.provincia?(", "+p.provincia):""), precio, pagado:!!p.pagado}); });
  const arr=Object.values(byEmp);
  arr.forEach(f=>{ f.ganancia=f.total-f.costo; f.pedidos.sort((a,b)=>a.zona.localeCompare(b.zona)||a.ref.localeCompare(b.ref)); });
  return arr;
}
async function finalizarPedido(id){

  toast("Pedido finalizado ✔"); pantallaCobro();

async function finalizarPagados(){
  const pagos=soloPedidos().filter(p=>facturable(p) && p.pagado);

  if(!confirm("¿Finalizar "+pagos.length+" pedidos pagados?\n\nQuedan cerrados y archivados (los ves con el filtro Finalizados).")) return;
  for(const p of pagos){ await DB.update(p.id,{estado:"finalizado",eventos:[...(p.eventos||[]),{estado:"finalizado",ts:Date.now(),nota:"Cerrado"}]}); }

/* Corrige el método de los pedidos YA guardados con la regla actual (CABA/BA -> cadete; retiro/otra prov -> correo) */
/* ===== CSV para la mensajería (formato Cardinal) — importa los envíos y te da tracking ===== */
function telCardinal(t){
  let d=String(t||"").replace(/\D/g,"");
  if(!d) return "";
  d=d.replace(/^0+/,"");
  if(d.startsWith("549")) return d;
  if(d.startsWith("54")) return "549"+d.slice(2);
  if(d.startsWith("15")) d=d.slice(2);           // celular viejo con 15
  return "549"+d;
}
function csvCampo(v){ v=String(v==null?"":v); return /[",\n\r]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function csvMensajeria(peds){
  const hoy=new Date(); const f=String(hoy.getDate()).padStart(2,"0")+"/"+String(hoy.getMonth()+1).padStart(2,"0")+"/"+String(hoy.getFullYear()).slice(-2);
  const head="Tracking externo,Tipo entrega,Fecha entrega,Valor,Peso (g),Origen,Or. Piso/Lote,Or. Puerta,Or. Observación,Or. Nombre,Or. Tel.,Or. Email,Destino,Des. Piso/Lote,Des. Puerta,Des. Observación,Des. Nombre,Des. Tel.,Des. Email,Bultos,Cobro Dest.";
  const filas=peds.map(p=>{
    const destino=[p.dir, p.ciudad, p.provincia].filter(Boolean).join(", ");
    return [codigoOrden(p),"Normal",f,0,0,"","","","","","","",
            csvCampo(destino),"","",csvCampo(p.nota||""),csvCampo(p.cliente||""),telCardinal(p.tel),"",0,0].join(",");
  });
  return "\uFEFF"+[head,...filas].join("\r\n")+"\r\n";
}
function descargarArchivo(nombre,contenido,mime){
  const url=URL.createObjectURL(new Blob([contenido],{type:mime||"text/csv;charset=utf-8"}));
  const a=document.createElement("a"); a.href=url; a.download=nombre; document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },400);
}

async function recalcularRutas(){
  let n=0;
  for(const p of soloPedidos()){
    if(p.estado==="anulado" || p.pagado) continue;
    if((p.correo||"")==="Punto de retiro") continue;               // retiro en sucursal queda correo
    const debe=llegaCadete(p)?"cadete":"correo";
    if(p.metodo!==debe){ await DB.update(p.id,{metodo:debe, correo:debe==="correo"?(p.correo||"Correo Argentino"):""}); n++; }
  }
  toast(n?("Corregí "+n+" pedido"+(n===1?"":"s")):"Ya estaba todo bien");
  vistaOperador();
}

function imputacionEmp(st,desde,hasta){
  const g={};
  (st.movs||[]).filter(m=>m.empresa && enRango(m.ts,desde,hasta)).forEach(m=>{
    const e=m.empresa;
    if(!g[e]) g[e]={empresa:e,total:0,aporte:0,canales:{},prods:{}};
    if(m.tipo==="salida"){ g[e].total+=m.cant; const c=m.canal||"?"; g[e].canales[c]=(g[e].canales[c]||0)+m.cant; g[e].prods[m.prod]=(g[e].prods[m.prod]||0)+m.cant; }
    else if(m.tipo==="entrada"){ g[e].aporte+=m.cant; }
  });
  return Object.values(g).map(x=>({...x, saldo:x.total-x.aporte})).sort((a,b)=>b.total-a.total);
}
/* Cuenta corriente: retiros (debe) y aportes (haber) de una empresa, con saldo neto en unidades */
function cuentaCorriente(st,empresa,desde,hasta){
  const movs=(st.movs||[]).filter(m=>m.empresa===empresa && (m.tipo==="salida"||m.tipo==="entrada") && enRango(m.ts,desde,hasta))
    .sort((a,b)=>a.ts-b.ts);
  const retiro=movs.filter(m=>m.tipo==="salida").reduce((s,m)=>s+m.cant,0);
  const aporte=movs.filter(m=>m.tipo==="entrada").reduce((s,m)=>s+m.cant,0);
  return { movs, retiro, aporte, saldo:retiro-aporte };
}
/* Entradas/salidas de un producto (salidas separadas por empresa) */
function flujoProducto(prod, st){
  let ent=0,sal=0; const porEmp={};
  (st.movs||[]).filter(m=>m.prod===prod).forEach(m=>{
    if(m.tipo==="entrada") ent+=m.cant;
    else if(m.tipo==="salida"){ sal+=m.cant; if(m.empresa) porEmp[m.empresa]=(porEmp[m.empresa]||0)+m.cant; }
  });
  return {ent,sal,porEmp};
}

  if(p.metodo==="correo"){

    if(p.estado==="despachado")acts+=`<button class="btn sm" onclick="avanzar('${p.id}','en_camino')">→ En camino</button>`;
    if(p.estado==="en_camino") acts+=`<button class="btn sm green" onclick="avanzar('${p.id}','entregado')">→ Entregado</button>`;
  }
  acts+=`<button class="btn sm ghost" onclick="cambiarRuta('${p.id}')">Editar</button>`;
  if(["pendiente","preparado","asignado","en_reparto","despachado","en_camino"].includes(p.estado))
    acts+=`<button class="btn sm green" onclick="avanzar('${p.id}','entregado')">✅ Entregado</button>`;
  acts+=`<button class="btn sm ghost" onclick="imprimirEtiqueta('${p.id}')">${icon('printer')}Etiqueta</button>`;
  acts+=`<button class="btn sm ghost" onclick="copiarLink('${p.id}')">Link</button>`;
  acts+=`<button class="btn sm green" onclick="waCliente('${p.id}')">WhatsApp</button>`;

    if(p.etiquetaPdf) acts+=`<button class="btn sm ghost" style="color:var(--green)" onclick='abrirEtiquetaPDF(PEDIDOS.find(x=>x.id==="${p.id}"))'>📎 Etiqueta correo ✓</button>`;
    else acts+=`<label class="btn sm ghost" style="cursor:pointer">📎 Adjuntar PDF correo<input type="file" accept="application/pdf" style="display:none" onchange="adjuntarEtiquetaCorreo('${p.id}',this.files[0])"></label>`;
  }
  if(p.estado==="anulado") acts+=`<button class="btn sm ghost" onclick="reactivarPedido('${p.id}')">Reactivar</button>`;
  else if(p.estado!=="confirmado") acts+=`<button class="btn sm ghost" style="color:var(--red)" onclick="anularPedido('${p.id}')">Anular</button>`;
  if(ROL==='admin') acts+=`<button class="btn sm ghost" style="color:var(--red)" onclick="eliminarPedido('${p.id}')">🗑️ Eliminar</button>`;
  const ruta=(p.origen==="riotercero"?"Río Tercero":"Bs As")+" · "+(p.metodo==="correo"?("Correo"+(p.correo?(" "+esc(p.correo)):"")):"Cadete");

      <div class="who">${esc(p.id)} · ${esc(p.tel||"—")}${p.ref?(' · '+esc(p.ref)):''}</div>

function despachar(id){

function parseTabla(texto){
  const lineas=texto.split(/\r?\n/).filter(l=>l.length);
  if(lineas.length<2) return [];
  const delim = lineas[0].includes("\t")?"\t" : (lineas[0].split(";").length>lineas[0].split(",").length?";":",");
  const split = l => { const out=[]; let cur="",q=false;       // CSV con comillas
    for(let i=0;i<l.length;i++){ const c=l[i];
      if(c==='"'){ q=!q; } else if(c===delim && !q){ out.push(cur); cur=""; } else cur+=c; }
    out.push(cur); return out.map(s=>s.trim().replace(/^"|"$/g,"")); };
  const heads = split(lineas[0]).map(h=>h.toLowerCase());
  const col = re => heads.findIndex(h=>re.test(h));
  const ix = {
    orden:  col(/n[uú]mero de orden|^orden|venta|pedido|^#/),
    cliente:col(/comprador|^cliente|destinatario|nombre para el env|^nombre$/),
    tel:    col(/tel[eé]fono/),
    dir:    col(/direcci/), num: col(/^n[uú]mero$/), piso: col(/piso/),
    loc:    col(/localidad/), ciudad: col(/ciudad/), prov: col(/provincia/),
    prod:   col(/nombre del producto|^producto|art[ií]culo|detalle|descripci/),
    cant:   col(/cantidad del producto|^cantidad/), sku: col(/sku/), envio: col(/medio de env[ií]o/),
    track:  col(/tracking|seguimiento/),
  };
  const g=(c,k)=> ix[k]>=0 ? (c[ix[k]]||"") : "";
  const groups=new Map(); let lastKey=null, seq=0;
  for(let i=1;i<lineas.length;i++){
    const c=split(lineas[i]); if(c.every(x=>!x)) continue;
    let key = ix.orden>=0 ? g(c,"orden") : "";
    if(key) lastKey=key; else key = lastKey || ("fila"+(++seq));   // ffill por orden
    if(!groups.has(key)) groups.set(key,{ref:key,cliente:"",tel:"",dir:"",loc:"",prov:"",envio:"",track:"",items:[]});
    const o=groups.get(key);
    const set=(k,v)=>{ if(v && !o[k]) o[k]=v; };
    set("cliente",g(c,"cliente")); set("tel",g(c,"tel")); set("prov",g(c,"prov"));
    set("envio",g(c,"envio")); set("track",g(c,"track"));
    set("loc", g(c,"loc")||g(c,"ciudad"));
    const calle=g(c,"dir"); if(calle && !o.dir) o.dir=(calle+" "+g(c,"num")+(g(c,"piso")?(" "+g(c,"piso")):"")).trim();
    const pn=g(c,"prod"); if(pn) o.items.push((g(c,"cant")||"1")+"x "+pn);
  }
  const out=[];
  for(const o of groups.values()){
    if(!o.cliente && !o.items.length) continue;
    const envL=o.envio.toLowerCase();
    const esCorreo=/correo|andreani|oca|cruz del sur|v[ií]a cargo|cl[aá]sico|expreso|retiro|moto.*correo/.test(envL);
    const r=sugerirRuta(o.prov,o.loc);
    out.push({ empresa:IMP_EMPRESA, ref:o.ref?("#"+o.ref.replace(/^#/,"")):"", cliente:o.cliente, tel:o.tel,
      dir:o.dir, ciudad:o.loc, provincia:o.prov, items:o.items.join(" · "),
      metodo: esCorreo?"correo":r.metodo, origen:r.origen,
      correo: esCorreo?(/retiro/.test(envL)?"Punto de retiro":(o.envio.match(/andreani|oca|correo argentino|cruz del sur|v[ií]a cargo/i)||["Correo Argentino"])[0]):"",
      tracking:o.track });
  }
  return out;
}

/* ---- Importar PDF de preparación de Tienda Nube (separa columnas por posición) ---- */
async function leerPDF(file){
  if(!file) return;
  if(typeof pdfjsLib==="undefined"){ toast("No se pudo cargar el lector de PDF. Probá con el CSV."); return; }
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const texto=await pdfTexto(file);
    IMP_FILAS=parsePDF(texto);
    if(!IMP_FILAS.length){ toast("No encontré órdenes en el PDF"); return; }
    mostrarPreviewImport();
  }catch(e){ toast("No pude leer el PDF"); }
}
async function pdfTexto(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const lineas=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const vp=page.getViewport({scale:1}); const mid=vp.width/2;
    const tc=await page.getTextContent();
    const items=tc.items.map(it=>({x:it.transform[4],y:it.transform[5],s:it.str})).filter(it=>it.s.trim());
    [0,1].forEach(c=>{
      const col=items.filter(it=>(it.x>=mid?1:0)===c);
      col.sort((a,b)=>(Math.round(b.y/3)-Math.round(a.y/3))||(a.x-b.x));
      let cy=null,line=[];
      col.forEach(it=>{ const yy=Math.round(it.y/3);
        if(cy===null||yy===cy){ line.push(it.s); } else { lineas.push(line.join(" ")); line=[it.s]; } cy=yy; });
      if(line.length) lineas.push(line.join(" "));
    });
  }
  return lineas.join("\n");
}
function parsePDF(text){
  const out=[]; const bloques=text.split(/(?=Orden #\d+)/);
  bloques.forEach(b=>{
    const mref=b.match(/Orden #(\d+)/); if(!mref) return;
    const L=b.split("\n").map(s=>s.trim());
    let i0=L.findIndex(l=>/^Producto/.test(l)); i0=i0<0?1:i0+1;
    let iend=L.findIndex(l=>/^Subtotal/.test(l)); if(iend<0) iend=L.length;
    const sec=L.slice(i0,iend);
    const qty=[],frags=[];
    sec.forEach((l,k)=>{ if(!l||/^SKU:/.test(l)) return;
      const m=l.match(/(\d+)\s*x\s*\$/);
      if(m){ qty.push({k,c:+m[1]}); const np=l.slice(0,m.index).trim(); if(np) frags.push({k,t:np}); }
      else frags.push({k,t:l}); });
    const prods=qty.map(q=>({c:q.c,n:[]}));
    if(prods.length) frags.forEach(fr=>{ let bi=0; for(let i=0;i<qty.length;i++){ if(qty[i].k<=fr.k) bi=i; } prods[bi].n.push(fr); });
    const items=prods.map(p=>p.c+"x "+p.n.sort((a,b)=>a.k-b.k).map(f=>f.t).join(" ").replace(/\s+/g," ").replace(/\s+,/g,",").trim()).join(" · ");
    let cli="",m=b.match(/Entregar a:\s*(.+)/); if(m) cli=m[1].trim();
    else { const ei=L.findIndex(l=>/^Enviar a:/.test(l)); if(ei>=0) for(let j=ei+1;j<L.length;j++){ if(L[j]){ cli=L[j]; break; } } }
    let tel=""; m=b.match(/Tel[eé]fono:\s*(.+)/); if(m) tel=m[1].trim(); if(/no informado/i.test(tel)) tel="";
    let prov="",loc="",dir="",cp="";
    for(let j=0;j<L.length;j++){ const mm=L[j].match(/^(.*),\s*([^,]+),\s*(\d{3,4})$/);
      if(mm){ loc=mm[1].split(",").pop().trim(); prov=mm[2].trim(); cp=mm[3]; if(j>0) dir=L[j-1]; break; } }
    const retiro=/Direcci[oó]n de retiro/i.test(b) || /a sucursal/i.test(b);
    const an=anilloDe({provincia:prov, ciudad:loc, dir});
    const r=sugerirRuta(prov,loc);
    let metodo,correo;
    if(retiro){ metodo="correo"; correo="Punto de retiro"; }        // retira en sucursal
    else if(llegaCadete({provincia:prov,ciudad:loc,dir})){ metodo="cadete"; correo=""; }   // CABA / Zona 1-3 => cadete
    else { metodo="correo"; correo="Correo Argentino"; }             // BA sin cadete u otra provincia => correo
    out.push({empresa:IMP_EMPRESA, ref:"#"+mref[1], cliente:cli, tel, dir, ciudad:loc, provincia:prov, cp,
      items, metodo, origen:r.origen, correo});
  });
  return out;
}

/* Devuelve al stock lo que se había descontado de un pedido (borra sus salidas) */
async function devolverStockPedido(id){
  const p=await DB.get(id); if(!p) return;
  const ref=p.ref||p.id; const st=stockState();
  st.movs=(st.movs||[]).filter(m=>!(m.tipo==="salida" && m.ref===ref));
  await persistStock(st);
}
/* Eliminar DEFINITIVO (solo admin): borra el pedido de la base */
async function eliminarPedido(id){
  const p=PEDIDOS.find(x=>x.id===id); if(!p) return;
  if(!confirm("¿ELIMINAR este pedido para siempre?\n\n"+(p.cliente||"")+" · "+numOrden(p)+"\n\nNo se puede recuperar. (Si solo querés sacarlo de la lista, usá Anular)")) return;
  if(!confirm("¿Seguro? Se borra definitivamente.")) return;
  try{
    if(p.stockBajado) await devolverStockPedido(id);   // devuelve el stock si estaba descontado
    await DB.delete(id);
    toast("Pedido eliminado 🗑️");
  }catch(e){ alert("⚠️ No pude eliminar: "+(e&&e.message||e)); }
  vistaOperador();
}
async function anularPedido(id){
  const p=PEDIDOS.find(x=>x.id===id); if(!p) return;
  if(!confirm("¿Anular este pedido? Sale de la lista y no se despacha. (Después lo podés reactivar)")) return;
  if(p.stockBajado) await devolverStockPedido(id);   // si se había descontado, se devuelve al stock
  await DB.update(id,{ estado:"anulado", stockBajado:false,
    eventos:[...(p.eventos||[]),{estado:"anulado",ts:Date.now(),nota:"Pedido anulado"}] });
  toast("Pedido anulado"); vistaOperador();
}
async function reactivarPedido(id){
  const p=PEDIDOS.find(x=>x.id===id); if(!p) return;
  await DB.update(id,{ estado:"pendiente",
    eventos:[...(p.eventos||[]),{estado:"pendiente",ts:Date.now(),nota:"Pedido reactivado"}] });
  toast("Pedido reactivado"); vistaOperador();
}

/* Lee el texto de un PDF en el ORDEN NATURAL del documento (ideal para remitos de una columna) */
async function pdfTextoRemito(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let out="";
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    let lastY=null;
    tc.items.forEach(it=>{ if(!it.str||!it.str.trim()){ return; }
      const y=Math.round(it.transform[5]);
      if(lastY!==null && Math.abs(y-lastY)>2) out+="\n";
      else if(out && !out.endsWith("\n")) out+=" ";
      out+=it.str.trim(); lastY=y; });
    out+="\n";
  }
  return out;
}
/* Lee el texto de un PDF por filas (sin cortar en columnas) */
async function pdfTextoPlano(file){
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const lineas=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    const items=tc.items.map(it=>({x:it.transform[4],y:it.transform[5],s:it.str})).filter(it=>it.s.trim());
    items.sort((a,b)=>(Math.round(b.y/3)-Math.round(a.y/3))||(a.x-b.x));
    let cy=null,line=[];
    items.forEach(it=>{ const yy=Math.round(it.y/3);
      if(cy===null||yy===cy){ line.push(it.s); } else { lineas.push(line.join(" ")); line=[it.s]; } cy=yy; });
    if(line.length) lineas.push(line.join(" "));
  }
  return lineas.join("\n");
}
/* Extrae producto + cantidad de un remito (ancla en el código PLN y la cantidad final) */
function parseRemito(text){
  const out=[]; const bloques=(text||"").split(/(?=\bPLN\d+)/i);
  bloques.forEach(b=>{
    if(!/\bPLN\d+/i.test(b)) return;
    // La cantidad viene con decimales (ej "15.00", "5.00") en la columna Cantidad
    const qm=b.match(/(\d+)[.,]\d{2}(?!\d)/);
    let cant = qm ? Math.round(parseFloat(qm[1])) : null;
    if(cant==null){ const ints=[...b.matchAll(/(\d{1,4})/g)].map(m=>+m[1]).filter(v=>v>0&&v<10000); cant=ints.length?ints[ints.length-1]:null; }
    // nombre = sacar el código PLN y la cantidad; dejar el resto (incluye "(60 Capsulas)")
    let nombre=b.replace(/^[\s\S]*?PLN\d+\s*/i,"").replace(/\d+[.,]\d{2}(?!\d)/,"").replace(/\s+/g," ").trim();
    if(nombre && cant) out.push({nombre, cant});
  });
  return out;
}

function escanearParaPedido(){ abrirEscaner(scanPrep,{continuo:true,hint:"Escaneá los productos del pedido"}); }
function scanPrep(code){
  const p=PEDIDOS.find(x=>x.id===PREP_ID); if(!p) return;
  const prod=prodPorBarcode(code);
  if(!prod){ toast("⚠ Código "+String(code||"").replace(/\D/g,"")+" no está en el catálogo"); return; }
  let it=itemsPedido(p).find(i=>i.prodNombre===prod.nombre);
  if(!it){ // el frasco escaneado puede ser la otra presentación del mismo producto (caps/comprimidos)
    it=itemsPedido(p).find(i=>baseProducto(i.prodNombre)===baseProducto(prod.nombre));
  }
  if(!it){ toast(prod.nombre.split(" ")[0]+" no es de este pedido"); return; }
  const cur=PREP_SCAN[it.prodNombre]||0;
  if(cur>=it.cant){ toast(it.nombre.split(" ").slice(0,2).join(" ")+" ya completo"); return; }
  PREP_SCAN[it.prodNombre]=cur+1;
  const its=itemsPedido(p);
  const completo=its.length && its.every(i=>(PREP_SCAN[i.prodNombre]||0)>=i.cant);
  if(completo){
    try{ navigator.vibrate && navigator.vibrate([180,80,180]); }catch(e){}
    toast("🎉 ¡PEDIDO COMPLETO! Tocá el botón verde e imprimí la etiqueta");
  } else {
    toast("✓ "+prod.nombre.split(" ").slice(0,2).join(" ")+" "+(cur+1)+"/"+it.cant);
  }
  pantallaPreparar(PREP_ID);
}

/* Escáner de cámara reutilizable. onCode(codigo) se llama en cada lectura.
   opts.continuo=true: sigue escaneando sin cerrar (para pickear varios productos). */
async function abrirEscaner(onCode, opts){
  opts=opts||{};
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    const c=prompt("Este teléfono no permite usar la cámara. Ingresá el código a mano:");
    if(c) onCode(c); return;
  }
  const ov=document.createElement("div"); ov.className="scan-ov";
  ov.innerHTML=`<video class="scan-vid" autoplay playsinline muted></video>
    <div class="scan-frame"></div>
    <div class="scan-hint">${esc(opts.hint||"Apuntá al código de barras")}</div>
    <div class="scan-last" id="scanLast"></div>
    <button class="btn scan-x">${opts.continuo?"Listo":"Cerrar"}</button>`;
  document.body.appendChild(ov);
  const vid=ov.querySelector("video");
  let reader=null, stop=false, ult="", ultTs=0;
  const cerrar=()=>{ if(stop)return; stop=true;
    try{ reader && reader.reset && reader.reset(); }catch(e){}
    try{ const s=vid.srcObject; if(s) s.getTracks().forEach(t=>t.stop()); }catch(e){}
    ov.remove(); };
  ov.querySelector(".scan-x").onclick=cerrar;
  const manejar=raw=>{ if(!raw) return; const now=Date.now();
    if(raw===ult && now-ultTs<1600) return;      // no repetir la misma lectura al toque
    ult=raw; ultTs=now;
    if(opts.continuo){ onCode(raw); const el=document.getElementById("scanLast"); if(el) el.textContent="✓ leído"; }
    else { cerrar(); onCode(raw); } };
  try{
    if(typeof ZXing!=="undefined" && ZXing.BrowserMultiFormatReader){
      reader=new ZXing.BrowserMultiFormatReader();
      await reader.decodeFromConstraints({video:{facingMode:"environment"}}, vid, r=>{
        if(r && !stop) manejar((r.getText&&r.getText())||r.text||""); });
    } else if("BarcodeDetector" in window){
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      vid.srcObject=stream;
      const det=new BarcodeDetector({formats:["code_128","qr_code","ean_13","code_39"]});
      const loop=async()=>{ if(stop)return;
        try{ const codes=await det.detect(vid); if(codes&&codes.length) manejar(codes[0].rawValue||""); }catch(e){}
        requestAnimationFrame(loop); };
      vid.onloadedmetadata=()=>loop();
    } else { cerrar(); const c=prompt("Ingresá el código a mano:"); if(c) onCode(c); }
  }catch(e){ cerrar(); toast("No pude abrir la cámara. Revisá los permisos del navegador."); }
}

/* --- Código de barras Code128 (vectorial: escanea siempre, sin internet) --- */
const C128=["212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"];
function code128B(text){
  const vals=[104]; let sum=104,pos=1;            // Start B
  for(const ch of String(text)){ let v=ch.charCodeAt(0)-32; if(v<0||v>94) v=0;
    vals.push(v); sum+=v*pos; pos++; }
  vals.push(sum%103); vals.push(106);             // checksum + Stop
  return vals.map(v=>C128[v]).join("");
}
function barcodeSVG(text,h){ h=h||44;
  const w=code128B(text); let x=0,total=0,rects="";
  for(let i=0;i<w.length;i++) total+=+w[i];
  for(let i=0;i<w.length;i++){ const n=+w[i];
    if(i%2===0) rects+=`<rect x="${x}" y="0" width="${n}" height="${h}" fill="#000"/>`; x+=n; }
  return `<svg class="bc" viewBox="0 0 ${total} ${h}" preserveAspectRatio="none">${rects}</svg>`;
}

        <div class="etq-sub">${remitente?("Envía: "+esc(remitente)+" · "):""}${origen}</div>
      </div>

        <div class="etq-anillo" style="background:${anilloColor(an.n)}">${an.n===0?"CABA":(an.n>=1&&an.n<=3?("<span>"+an.n+"<br><small>zona</small></span>"):"<small>rev.</small>")}</div>
        <div class="etq-id">${esc(numOrden(p))}</div>
      </div>
    </div>

    ${esSC?`<div style="border:1.2mm solid #000;padding:1.6mm 2mm;text-align:center;font-weight:900;font-size:6mm;letter-spacing:1.5mm;margin:1.5mm 0">⚠ FRÁGIL ⚠<div style="font-size:2.8mm;letter-spacing:.4mm;font-weight:700;margin-top:.5mm">MANIPULAR CON CUIDADO · NO GOLPEAR · ESTE LADO ARRIBA</div></div>`:''}

    ${esCABA?`<div class="etq-items"><span class="etq-lbl">CONTENIDO</span>${parseItems(p.items).map(it=>`<div class="etq-it"><span class="etq-chk"></span><b>${it.cant}×</b>${esc(it.nombre)}</div>`).join("")||esc(p.items||"-")}</div>`:""}
    ${p.metodo==="correo"?`<div class="etq-track"><span class="t-c">${esc(p.correo||"CORREO")}</span><span class="t-n">${esc(p.tracking||"s/ número")}</span></div>`:""}

/* Imprime una o varias etiquetas, cada una en su propia etiqueta del rollo */
function printLabels(arr){
  if(!arr||!arr.length){ toast("No hay etiquetas para imprimir"); return; }
  const w=window.open("","_blank","width=460,height=760");
  if(!w){ toast("Permití las ventanas emergentes para imprimir"); return; }
  const body=arr.map(p=>`<div class="page">${etiquetaBody(p)}</div>`).join("");
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>Etiquetas</title>'+
    '<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">'+
    '<style>@page{size:'+LABEL_MM.w+'mm '+LABEL_MM.h+'mm;margin:0}html,body{margin:0;padding:0}'+
    '.page{break-after:page;page-break-after:always}.page:last-child{break-after:auto;page-break-after:auto}'+
    ETQ_CSS+'</style></head><body>'+body+
    '<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print()},400)}<\/scr'+'ipt></body></html>');
  w.document.close();
}
function imprimirEtiqueta(id){
  const p=PEDIDOS.find(x=>x.id===id) || ((SIM&&SIM.id===id)?SIM:null);
  if(!p){ toast("No encontré el pedido"); return; }
  if(p.etiquetaPdf){ abrirEtiquetaPDF(p); return; }   // usa la etiqueta del correo (Tienda Nube)
  if((p.correo||"")==="Punto de retiro"){ alert("Este pedido es CORREO A SUCURSAL: va con la etiqueta del correo, no la nuestra.\n\nAdjuntale el PDF de Tienda Nube (botón 📎 Adjuntar) y volvé a imprimir."); return; }
  printLabels([p]);
}
function imprimirLote(){ pantallaEtiquetas(); }
let SEL_ETQ={};
function etqImprimibles(){ return soloPedidos().filter(p=>!["entregado","confirmado","anulado"].includes(p.estado)); }
function pantallaEtiquetas(){
  const arr=etqImprimibles();
  const n=arr.filter(p=>SEL_ETQ[p.id]).length;
  app().innerHTML=`
    <button class="btn sm ghost" onclick="vistaOperador()">← Volver</button>
    <div class="title" style="margin-top:14px">Imprimir etiquetas</div>
    <div class="subtitle">Marcá las que querés imprimir. Podés corregir cada una con “Editar”.</div>
    <div class="row" style="gap:8px;margin:14px 0">
      <button class="btn sm ghost" onclick="selEtq(true)">Marcar todas</button>
      <button class="btn sm ghost" onclick="selEtq(false)">Ninguna</button>
    </div>
    ${arr.length?arr.map(p=>{ const suc=(p.correo||"")==="Punto de retiro";
      return `
      <div class="card" style="margin-bottom:10px;padding:14px 16px;display:flex;gap:12px;align-items:center">
        <label style="display:flex;gap:12px;align-items:flex-start;cursor:pointer;flex:1;min-width:0;margin:0">
          <input type="checkbox" ${SEL_ETQ[p.id]?'checked':''} onchange="toggleEtq('${p.id}')" style="width:22px;height:22px;margin-top:2px;flex:0 0 auto;accent-color:var(--accent)">
          <span style="min-width:0">
            <span style="font-weight:600;display:block">${esc(p.cliente||'—')} <span class="muted" style="font-weight:400">· N° ${esc(numOrden(p))}</span>${suc?` <span class="chip" style="background:#fff3cd;color:#7a5a00;font-weight:700">🏤 SUCURSAL</span>`:''}${p.etiquetaPdf?` <span class="chip" style="background:#d9f2e5;color:#0f6b40;font-weight:700">📎 ETIQUETA CORREO</span>`:''}</span>
            <span class="muted" style="font-size:13px;display:block;margin-top:2px">${esc(p.dir||'')}${p.ciudad?(' — '+esc(p.ciudad)):''}</span>
            <span class="muted" style="font-size:13px;display:block;margin-top:2px">${esc(p.items||'—')}</span>
            ${(p.metodo==='correo'&&!p.etiquetaPdf)?`<span class="muted" style="font-size:12px;display:block;margin-top:2px;color:#a06a00">⚠ Falta el PDF del correo (adjuntalo acá →)</span>`:''}
          </span>
        </label>
        ${p.metodo==='correo'?(p.etiquetaPdf
          ?`<button class="btn sm ghost" style="flex:0 0 auto;color:var(--green)" onclick='abrirEtiquetaPDF(PEDIDOS.find(x=>x.id==="${p.id}"))'>📎 Ver PDF</button>`
          :`<label class="btn sm ghost" style="flex:0 0 auto;cursor:pointer">📎 Adjuntar<input type="file" accept="application/pdf" style="display:none" onchange="adjuntarEtiquetaCorreo('${p.id}',this.files[0])"></label>`)
          :`<button class="btn sm ghost" style="flex:0 0 auto" onclick="cambiarRuta('${p.id}')">Editar</button>`}
      </div>`; }).join(""):empty('box','No hay pedidos para etiquetar.')}
    ${arr.length?`<div style="position:sticky;bottom:16px;margin-top:18px">
      <button class="btn block" onclick="imprimirSeleccionadas()">${icon('printer')} Imprimir ${n} etiqueta${n===1?'':'s'}</button>
    </div>`:''}`;
}
function toggleEtq(id){ SEL_ETQ[id]=!SEL_ETQ[id]; pantallaEtiquetas(); }
function selEtq(v){ SEL_ETQ={}; if(v) etqImprimibles().forEach(p=>SEL_ETQ[p.id]=true); pantallaEtiquetas(); }
function imprimirSeleccionadas(){ const arr=soloPedidos().filter(p=>SEL_ETQ[p.id]);
  if(!arr.length){ toast("Marcá al menos una etiqueta"); return; }
  const conPdf=arr.filter(p=>p.etiquetaPdf);
  const sucSinPdf=arr.filter(p=>!p.etiquetaPdf && (p.correo||"")==="Punto de retiro");
  const sinPdf=arr.filter(p=>!p.etiquetaPdf && (p.correo||"")!=="Punto de retiro");
  if(sinPdf.length) printLabels(sinPdf);                       // nuestras etiquetas
  conPdf.forEach(p=>abrirEtiquetaPDF(p));                      // las del correo (PDF de Tienda Nube)
  if(conPdf.length) toast(conPdf.length+" con etiqueta del correo (se abren aparte)");
  if(sucSinPdf.length) alert(sucSinPdf.length+" pedido(s) de CORREO A SUCURSAL sin PDF adjunto:\n\n"+sucSinPdf.map(p=>"• "+(p.cliente||"")+" ("+numOrden(p)+")").join("\n")+"\n\nA esos no les imprimo nuestra etiqueta: adjuntales el PDF del correo (📎) y volvé a imprimir."); }

   9) SIMULACIÓN DEL CICLO COMPLETO (modo demostración, no toca tus datos)
   ========================================================================= */

function simPasos(){

    {rol:"Bs As", actor:"Operador",              estado:"preparado", t:"Prepara y empaqueta",   d:"Arma el paquete en el depósito."},
    {rol:"Bs As", actor:"Operador",              estado:"preparado", t:"Imprime la etiqueta",   d:"La pega en el paquete. Lleva los datos y el QR de seguimiento.", etiqueta:true},
    {rol:"Bs As", actor:"Operador",              estado:"asignado",  t:"Asigna a un cadete",    d:"Le pasa el pedido al cadete de la zona."},
    {rol:"CABA",  actor:"Cadete",                estado:"en_reparto",t:"Sale a repartir",       d:"El cadete arranca el reparto y lo ve en su celular."},
    {rol:"CABA",  actor:"Cadete",                estado:"entregado", t:"Entrega y saca foto",   d:"Deja el paquete y registra la foto de comprobante.", foto:true},
    {rol:"CABA",  actor:"Cliente",               estado:"confirmado",t:"Confirma la recepción", d:"Desde su link confirma que lo recibió.", cliente:true},

}
function abrirSim(){ ROL="sim"; SIM_METODO="cadete"; simReset(); }
function setSimMetodo(m){ SIM_METODO=m; simReset(); }
function simReset(){ SIM=simOrden(); SIM_STEP=0; SIM.estado=simPasos()[0].estado; stopPlay(); vistaSimulacion(); }
function stopPlay(){ if(SIM_TIMER){ clearInterval(SIM_TIMER); SIM_TIMER=null; } }
function simNext(){ const ps=simPasos();
  if(SIM_STEP<ps.length-1){ SIM_STEP++; SIM.estado=ps[SIM_STEP].estado; } else stopPlay();
  vistaSimulacion(); }
function simPrev(){ if(SIM_STEP>0){ SIM_STEP--; SIM.estado=simPasos()[SIM_STEP].estado; } vistaSimulacion(); }
function simPlay(){ if(SIM_TIMER){ stopPlay(); vistaSimulacion(); return; }
  SIM_TIMER=setInterval(()=>{ if(SIM_STEP>=simPasos().length-1){ stopPlay(); vistaSimulacion(); } else simNext(); },1700);
  vistaSimulacion(); }
function vistaSimulacion(){
  if(ROL!=="sim") return;
  if(!SIM) SIM=simOrden();
  const ps=simPasos(), step=ps[SIM_STEP], fl=flujo(SIM), actual=idxEst(SIM);
  const tl=fl.map((eid,i)=>{ const e=estObj(eid); const cls=i<actual?"done":i===actual?"current":"pending";
    return `<div class="step ${cls}"><div class="pt"></div><div class="s-t">${e.label}</div></div>`; }).join("");
  app().innerHTML=`
    <div class="title">Simulación del ciclo</div>
    <div class="subtitle">Mirá cómo viaja un pedido de punta a punta</div>
    <div class="seg" style="margin-bottom:16px">
      <button class="${SIM_METODO==='cadete'?'on':''}" onclick="setSimMetodo('cadete')">Cadete (AMBA)</button>
      <button class="${SIM_METODO==='correo'?'on':''}" onclick="setSimMetodo('correo')">Correo (interior)</button>
    </div>
    <div class="card">
      <div class="row" style="gap:8px">
        <span class="chip">${esc(step.rol)}</span>
        <span class="badge"><span class="dot" style="background:${estObj(step.estado).color}"></span>${estObj(step.estado).label}</span>
      </div>
      <div style="font-size:22px;font-weight:700;letter-spacing:-.01em;margin-top:12px">${esc(step.t)}</div>
      <div class="muted" style="margin-top:4px">${esc(step.actor)} · ${esc(step.d)}</div>
      ${step.etiqueta?`<div style="margin-top:16px"><style>${ETQ_CSS}</style>
        <div style="height:calc(${LABEL_MM.h}mm * .72);overflow:hidden"><div style="transform:scale(.72);transform-origin:top left;width:${LABEL_MM.w}mm">${etiquetaBody(SIM)}</div></div>
        <button class="btn sm" style="margin-top:12px" onclick="imprimirEtiqueta('${SIM.id}')">${icon('printer')}Imprimir etiqueta</button></div>`:""}
      ${step.foto?`<div class="proof" style="margin-top:16px"><span class="label">Foto de comprobante</span>
        <div style="height:140px;border-radius:12px;border:.5px dashed var(--border-2);display:flex;align-items:center;justify-content:center;color:var(--text-3)">Acá el cadete saca la foto</div></div>`:""}
      ${step.cliente?`<div style="margin-top:16px"><button class="btn green block" onclick="simNext()">Sí, lo recibí ✓ <span class="muted" style="font-size:13px">(lo toca el cliente)</span></button></div>`:""}
    </div>
    <div class="row" style="margin:16px 0;justify-content:center">
      <button class="btn ghost sm" onclick="simPrev()">← Anterior</button>
      <button class="btn" onclick="simPlay()">${SIM_TIMER?"Pausar":"Reproducir todo"}</button>
      <button class="btn ghost sm" onclick="simNext()">Siguiente →</button>
      <button class="btn ghost sm" onclick="simReset()">Reiniciar</button>
    </div>
    <div class="card"><span class="label">Recorrido</span><div class="tl">${tl}</div></div>
    <p class="center muted" style="margin-top:14px;font-size:13px">Paso ${SIM_STEP+1} de ${ps.length}</p>`;
}

/* =========================================================================
   10) ARRANQUE
   ========================================================================= */
(function start(){
  initDB();
  const q=new URLSearchParams(location.search);
  const esCliente=!!q.get("p");
  if(esCliente){
    if(DB.modo!=="firebase") DB.subscribe(d=>{ PEDIDOS=d; render(); });
    render();                                  // vistaCliente lee su pedido con DB.get
  } else if(DB.modo==="firebase"){
    firebase.auth().onAuthStateChanged(async (user)=>{
      USER=user; USERROL=null; CADETE_ACTIVO=null;
      if(user){
        try{ const d=await firebase.firestore().collection("usuarios").doc(user.email).get();
          if(d.exists){ USERROL=d.data().rol||null;
            if(USERROL==="cadete") CADETE_ACTIVO=d.data().cadete||d.data().nombre||null; }
        }catch(e){ USERROL=null; }
        if(USERROL && !SUBSCRITO){ SUBSCRITO=true; DB.subscribe(d=>{ PEDIDOS=d; render(); }); }
      }
      AUTH_READY=true; render();
    });
  } else {
    DB.subscribe(d=>{ PEDIDOS=d; render(); });
    render();
  }
})();
</script>
